{% extends "base.html" %}
{% block title %}Login — PointlesSQL{% endblock %}

{% block content_class %}d-flex align-items-center justify-content-center{% endblock %}

{% block content %}
<div class="card border-secondary" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">
            <i class="bi bi-database"></i> PointlesSQL
        </h4>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="post" action="/auth/login" hx-boost="false">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       required autofocus placeholder="you@example.com">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>

        <p class="text-center text-muted mt-3 mb-0">
            Don't have an account? <a href="/auth/register">Register</a>
        </p>
    </div>
</div>
{% endblock %}
