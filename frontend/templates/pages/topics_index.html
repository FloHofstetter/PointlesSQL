{% extends "base.html" %}
{% block title %}Topics · PointlesSQL{% endblock %}

{% set breadcrumbs = [
    {"label": "Home", "href": "/"},
    {"label": "Topics"}
] %}
{% block breadcrumbs %}{% include "components/breadcrumbs.html" %}{% endblock %}

{% block content %}
<div x-data="topicsIndex({ is_admin: {{ is_admin|tojson }} })" x-init="init()">

    <div class="d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-tags fs-3"></i>
        <h1 class="h3 mb-0">Topics</h1>
        <button class="btn btn-sm btn-primary ms-auto pql-topics-new-btn"
                @click="creating = !creating">
            <i class="bi bi-plus-lg me-1"></i>New topic
        </button>
    </div>

    <template x-if="creating">
        <div class="card mb-3">
            <div class="card-body">
                <label class="form-label small">Display name</label>
                <input class="form-control mb-2 pql-topics-new-name"
                       x-model="newName"
                       placeholder="e.g. finance, gold-tier, ml-feature-store">
                <label class="form-label small">Description (markdown)</label>
                <textarea class="form-control mb-2 pql-topics-new-desc"
                          rows="2" x-model="newDesc"></textarea>
                <button class="btn btn-sm btn-primary pql-topics-new-save"
                        :disabled="!newName.trim() || submitting"
                        @click="create()">
                    <span x-show="submitting" class="spinner-border spinner-border-sm me-1" aria-hidden="true"></span>
                    <span x-text="submitting ? 'Creating…' : 'Create'"></span>
                </button>
                <button class="btn btn-sm btn-outline-secondary"
                        @click="creating = false">Cancel</button>
            </div>
        </div>
    </template>

    <template x-if="!loaded">
        <div class="placeholder-glow pql-topics-skeleton row g-2" aria-hidden="true">
            <div class="col-md-4">
                <div class="card p-3">
                    <div class="placeholder col-7 mb-2"></div>
                    <div class="placeholder col-9 mb-2"></div>
                    <div class="placeholder col-5"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <div class="placeholder col-6 mb-2"></div>
                    <div class="placeholder col-8 mb-2"></div>
                    <div class="placeholder col-4"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <div class="placeholder col-7 mb-2"></div>
                    <div class="placeholder col-5 mb-2"></div>
                    <div class="placeholder col-6"></div>
                </div>
            </div>
        </div>
    </template>
    <template x-if="loaded && topics.length === 0">
        <div>
            {% with icon="bi-hash",
                   title="No topics yet",
                   message="Topics group data products and people around a shared subject — finance, ml-feature-store, ml-team, etc.",
                   action_href="/topics?new=1", action_label="Create the first topic" %}
            {% include "components/empty.html" %}
            {% endwith %}
        </div>
    </template>
    <div class="row g-2 pql-topics-grid" x-show="loaded && topics.length > 0">
        <template x-for="t in topics" :key="t.slug">
            <div class="col-md-4">
                <div class="card pql-topic-card pql-hover-lift">
                    <div class="card-body">
                        <h5 class="card-title h6">
                            <a :href="'/topics/' + t.slug"
                               x-text="t.display_name"></a>
                        </h5>
                        <p class="card-text small text-muted text-truncate"
                           x-text="t.description_md || '(no description)'"></p>
                        <div class="d-flex justify-content-between small">
                            <span><i class="bi bi-box me-1"></i><span x-text="t.dp_count"></span> DPs</span>
                            <span><i class="bi bi-people me-1"></i><span x-text="t.follower_count"></span></span>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
window.topicsIndex = function (ctx) {
    ctx = ctx || {};
    return {
        isAdmin: !!ctx.is_admin,
        loaded: false,
        topics: [],
        creating: false,
        submitting: false,
        newName: '',
        newDesc: '',
        async init() {
            // Phase 80 polish: ``/topics?new=1`` deep-links open the
            // inline create form so the quick-create menu + topics
            // sidebar can drop the user straight into authoring.
            try {
                if (new URL(location.href).searchParams.get('new') === '1') {
                    this.creating = true;
                }
            } catch (_) { /* URL parse never throws in practice */ }
            await this.load();
        },
        async load() {
            try {
                const res = await fetch('/api/topics');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                this.topics = data.topics || [];
            } catch (e) { console.error('topics load failed', e); }
            finally { this.loaded = true; }
        },
        async create() {
            this.submitting = true;
            const name = this.newName.trim();
            try {
                const res = await fetch('/api/topics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        display_name: name,
                        description_md: this.newDesc.trim(),
                    }),
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                window.pqlToast?.success(`Topic "${name}" created.`);
                this.newName = '';
                this.newDesc = '';
                this.creating = false;
                await this.load();
            } catch (e) {
                console.error('topic create failed', e);
                window.pqlToast?.error(`Failed to create topic: ${e.message}`);
            } finally {
                this.submitting = false;
            }
        },
    };
};
</script>
{% endblock %}
