{% extends "base.html" %}
{% block title %}Workspace · PointlesSQL{% endblock %}

{% block breadcrumbs %}
<ol class="breadcrumb mb-0 ms-3">
    <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Home</a></li>
    <li class="breadcrumb-item active">Workspace</li>
</ol>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
    <i class="bi bi-folder2-open fs-3"></i>
    <h1 class="h3 mb-0">Notebook workspace</h1>
</div>

<div class="row g-3" x-data="notebookWorkspace()" x-init="load()">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between py-2">
                <span class="text-uppercase small fw-semibold text-muted">Notebooks</span>
                <button class="btn btn-sm btn-link p-0 text-muted" @click="reload()" title="Refresh">
                    <i class="bi bi-arrow-clockwise" :class="loading ? 'pql-spin' : ''"></i>
                </button>
            </div>
            <div class="card-body p-2">
                <template x-if="error">
                    <div class="alert alert-danger m-1 small" x-text="error"></div>
                </template>

                <template x-if="!tree && !error">
                    <div class="text-muted small p-2">
                        <span class="spinner-border spinner-border-sm me-1"></span>Loading…
                    </div>
                </template>

                <template x-if="tree && flatRows().length === 0 && !error">
                    <div class="text-muted small p-2 fst-italic">
                        No notebooks in the workspace yet. Upload one to get started.
                    </div>
                </template>

                <ul class="list-unstyled mb-0" x-show="tree && flatRows().length > 0" x-cloak>
                    <template x-for="row in flatRows()" :key="row.path">
                        <li>
                            <div class="pql-tree-item"
                                 :style="'padding-left: ' + (row.depth * 1) + 'rem;'">
                                <template x-if="row.kind === 'dir'">
                                    <button class="pql-tree-chevron"
                                            @click="toggle('d:' + row.path)"
                                            :aria-expanded="isOpen('d:' + row.path)">
                                        <i class="bi"
                                           :class="isOpen('d:' + row.path) ? 'bi-chevron-down' : 'bi-chevron-right'"></i>
                                    </button>
                                </template>
                                <template x-if="row.kind === 'notebook'">
                                    <span class="pql-tree-chevron"></span>
                                </template>

                                <span class="pql-tree-label">
                                    <template x-if="row.kind === 'dir'">
                                        <i class="bi bi-folder2"></i>
                                    </template>
                                    <template x-if="row.kind === 'notebook'">
                                        <i class="bi bi-journal-code"></i>
                                    </template>
                                    <span class="text-truncate font-monospace" x-text="row.name"></span>
                                    <template x-if="row.kind === 'notebook' && row.parameters_tagged">
                                        <span class="badge bg-success ms-1"
                                              style="font-size: 0.6rem;"
                                              title="Notebook declares Papermill parameters">
                                            PARAMS
                                        </span>
                                    </template>
                                </span>

                                <template x-if="row.kind === 'notebook'">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-primary ms-auto py-0 px-2"
                                            style="font-size: 0.75rem;"
                                            @click="schedule(row.path)">
                                        <i class="bi bi-calendar-plus"></i> Schedule…
                                    </button>
                                </template>
                            </div>
                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </div>

    <div class="col-lg-5">
        <div class="card">
            <div class="card-header py-2">
                <span class="text-uppercase small fw-semibold text-muted">Upload notebook</span>
            </div>
            <div class="card-body">
                <form @submit.prevent="upload()" x-ref="uploadForm">
                    <div class="mb-3">
                        <label class="form-label small" for="wsTargetPath">Target path</label>
                        <input type="text"
                               id="wsTargetPath"
                               class="form-control form-control-sm font-monospace"
                               x-model="targetPath"
                               placeholder="pipelines/my_notebook.ipynb"
                               required>
                        <div class="form-text small">
                            Relative to the notebooks directory. Must end in <code>.ipynb</code>.
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small" for="wsFile">File</label>
                        <input type="file"
                               id="wsFile"
                               class="form-control form-control-sm"
                               accept=".ipynb,application/json"
                               x-ref="file"
                               required>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox"
                               id="wsOverwrite"
                               class="form-check-input"
                               x-model="overwrite">
                        <label for="wsOverwrite" class="form-check-label small">
                            Overwrite if a file already exists at the target path
                        </label>
                    </div>
                    <div class="alert alert-danger py-1 px-2 small"
                         x-show="uploadError"
                         x-text="uploadError"
                         x-cloak></div>
                    <div class="alert alert-success py-1 px-2 small"
                         x-show="uploadStatus"
                         x-text="uploadStatus"
                         x-cloak></div>
                    <button type="submit"
                            class="btn btn-primary btn-sm"
                            x-bind:disabled="uploading">
                        <span x-show="!uploading">Upload</span>
                        <span x-show="uploading" x-cloak>
                            <span class="spinner-border spinner-border-sm me-1"></span>Uploading…
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    const STORAGE_KEY = 'pql.notebooks';
    const OPEN_KEY = 'pql.notebooks.open';

    /**
     * Flatten a nested tree into a list of rows. A row is rendered only
     * when every one of its ancestor directories is open (per `open`).
     * The root directories are always visible.
     */
    function flatten(tree, open) {
        const out = [];
        function visit(nodes, depth, ancestorsVisible) {
            for (const n of nodes) {
                if (ancestorsVisible) {
                    out.push({
                        path: n.path,
                        name: n.name,
                        kind: n.kind,
                        depth: depth,
                        parameters_tagged: !!n.parameters_tagged,
                    });
                }
                if (n.kind === 'dir' && n.children && n.children.length) {
                    const opened = !!open['d:' + n.path];
                    visit(n.children, depth + 1, ancestorsVisible && opened);
                }
            }
        }
        visit(tree || [], 0, true);
        return out;
    }

    window.notebookWorkspace = function () {
        return {
            tree: null,
            loading: false,
            error: null,
            open: {},
            targetPath: '',
            overwrite: false,
            uploading: false,
            uploadError: null,
            uploadStatus: null,

            isOpen(key) { return !!this.open[key]; },

            toggle(key) {
                this.open[key] = !this.open[key];
                try { sessionStorage.setItem(OPEN_KEY, JSON.stringify(this.open)); } catch (e) {}
            },

            flatRows() { return flatten(this.tree, this.open); },

            async load() {
                try {
                    const cached = sessionStorage.getItem(STORAGE_KEY);
                    if (cached) this.tree = JSON.parse(cached);
                    const openCached = sessionStorage.getItem(OPEN_KEY);
                    if (openCached) this.open = JSON.parse(openCached);
                } catch (e) {}

                if (!this.tree) await this.fetchTree();
                else this.fetchTree();
            },

            async reload() {
                try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
                this.tree = null;
                await this.fetchTree();
            },

            async fetchTree() {
                this.loading = true;
                this.error = null;
                try {
                    const res = await fetch('/api/notebooks/tree');
                    if (!res.ok) {
                        const body = await res.json().catch(() => null);
                        throw new Error(body?.error?.message || ('HTTP ' + res.status));
                    }
                    const data = await res.json();
                    this.tree = data;
                    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
                } catch (e) {
                    if (!this.tree) this.error = 'Failed to load tree: ' + e.message;
                } finally {
                    this.loading = false;
                }
            },

            schedule(path) {
                const qs = new URLSearchParams({
                    prefill_kind: 'papermill',
                    prefill_notebook_path: path,
                });
                window.location.href = '/jobs?' + qs.toString();
            },

            async upload() {
                this.uploadError = null;
                this.uploadStatus = null;
                const files = this.$refs.file.files;
                if (!files || files.length === 0) {
                    this.uploadError = 'pick a notebook file to upload';
                    return;
                }
                if (!this.targetPath) {
                    this.uploadError = 'target path is required';
                    return;
                }
                this.uploading = true;
                try {
                    const form = new FormData();
                    form.append('file', files[0]);
                    form.append('target_path', this.targetPath);
                    form.append('overwrite', this.overwrite ? 'true' : 'false');
                    const res = await fetch('/api/notebooks/upload', {
                        method: 'POST',
                        body: form,
                    });
                    const body = await res.json().catch(() => null);
                    if (!res.ok) {
                        this.uploadError = body?.error?.message || ('HTTP ' + res.status);
                        return;
                    }
                    this.uploadStatus = 'Uploaded ' + body.path + ' (' + body.status + ').';
                    this.$refs.uploadForm.reset();
                    this.targetPath = '';
                    this.overwrite = false;
                    await this.reload();
                } catch (e) {
                    this.uploadError = String(e);
                } finally {
                    this.uploading = false;
                }
            },
        };
    };
})();
</script>
{% endblock %}
