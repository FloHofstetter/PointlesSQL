{% extends "_layouts/auth_chromeless.html" %}
{% block title %}Forbidden — PointlesSQL{% endblock %}

{% block content %}
<div class="pql-card pql-empty pql-empty--warning">
    <i class="bi bi-shield-lock pql-empty__icon" aria-hidden="true"></i>
    <p class="pql-empty__title">Access denied</p>
    <p class="pql-empty__message">
        You do not have
        <code>{{ required_privilege }}</code>
        on {{ securable_type }}
        <code>{{ full_name }}</code>.
    </p>
    <p class="pql-empty__meta">Contact an administrator to request access.</p>
    <a href="/" class="btn btn-outline-primary btn-sm pql-empty__action">Back to Home</a>
</div>
{% endblock %}
