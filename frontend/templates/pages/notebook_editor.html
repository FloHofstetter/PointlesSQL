{% extends "base.html" %}
{% block title %}Editor · {{ notebook_path }} · PointlesSQL{% endblock %}
{% block content_class %}pql-content--notebook-editor{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/js/vendor/monaco/vs/editor/editor.main.css">
<style>
    .pql-nbedit-root { display: flex; flex-direction: column; min-height: calc(100vh - 60px); }
    .pql-nbedit-toolbar { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem;
                          border-bottom: 1px solid var(--bs-border-color); background: var(--bs-body-bg); }
    .pql-nbedit-toolbar .pql-nbedit-path { font-family: var(--bs-font-monospace); font-size: 0.9rem;
                                           color: var(--bs-secondary-color); }
    .pql-nbedit-toolbar .pql-nbedit-dirty { font-size: 0.8rem; color: var(--bs-warning); }
    .pql-nbedit-editor { flex: 1 1 auto; min-height: 400px; }
    .pql-nbedit-cell-band-code { background: rgba(108, 117, 125, 0.08); }
    .pql-nbedit-cell-band-markdown { background: rgba(13, 110, 253, 0.07); }
    .pql-nbedit-cell-marker { color: var(--bs-info); font-weight: 600; }
    .pql-nbedit-output { padding: 0.5rem 1rem; background: rgba(0, 0, 0, 0.18);
                        border-left: 3px solid var(--bs-secondary); font-family: var(--bs-font-monospace);
                        font-size: 12.5px; white-space: pre-wrap; word-break: break-word; }
    .pql-nbedit-output pre { margin: 0; padding: 0; background: transparent; color: inherit; white-space: pre-wrap; }
    .pql-nbedit-output-stream { color: var(--bs-body-color); }
    .pql-nbedit-output-stderr { color: var(--bs-warning); }
    .pql-nbedit-output-result { color: var(--bs-info); }
    .pql-nbedit-output-error { color: var(--bs-danger); }
    .pql-nbedit-output-json { color: var(--bs-info); font-size: 12px; }
    .pql-nbedit-output-image { max-width: 100%; display: block; margin: 0.25rem 0; }
    .pql-nbedit-output-svg { max-width: 100%; display: block; margin: 0.25rem 0; }
    .pql-nbedit-output-svg svg { max-width: 100%; height: auto; }
    .pql-nbedit-output-html { color: var(--bs-body-color); font-size: 13px; }
    .pql-nbedit-output-html table { border-collapse: collapse; font-size: 12.5px; margin: 0.25rem 0; }
    .pql-nbedit-output-html th, .pql-nbedit-output-html td { border: 1px solid var(--bs-border-color); padding: 0.2rem 0.4rem; }
    .pql-nbedit-output-html th { background: rgba(255, 255, 255, 0.04); font-weight: 600; }
    .pql-nbedit-output-html tr:hover { background: rgba(255, 255, 255, 0.02); }
    .pql-nbedit-md-preview { padding: 0.6rem 1rem; background: rgba(13, 110, 253, 0.06);
                             border-left: 3px solid var(--bs-info); cursor: pointer;
                             font-size: 13.5px; line-height: 1.5; color: var(--bs-body-color); }
    .pql-nbedit-md-preview:hover { background: rgba(13, 110, 253, 0.10); }
    .pql-nbedit-md-preview h3, .pql-nbedit-md-preview h4, .pql-nbedit-md-preview h5,
    .pql-nbedit-md-preview h6 { margin: 0.6rem 0 0.25rem 0; font-weight: 600; }
    .pql-nbedit-md-preview h3 { font-size: 1.15rem; }
    .pql-nbedit-md-preview h4 { font-size: 1.05rem; }
    .pql-nbedit-md-preview h5, .pql-nbedit-md-preview h6 { font-size: 1rem; }
    .pql-nbedit-md-preview p { margin: 0.3rem 0; }
    .pql-nbedit-md-preview code { background: rgba(0, 0, 0, 0.25); padding: 1px 4px;
                                   border-radius: 3px; font-family: var(--bs-font-monospace); }
    .pql-nbedit-md-preview pre.pql-nbedit-md-code { background: rgba(0, 0, 0, 0.25);
                                                     padding: 0.5rem 0.75rem; border-radius: 4px;
                                                     overflow-x: auto; margin: 0.35rem 0; }
    .pql-nbedit-md-preview pre.pql-nbedit-md-code code { background: transparent; padding: 0; }
    .pql-nbedit-md-preview ul { margin: 0.25rem 0 0.25rem 1.5rem; padding: 0; }
    .pql-nbedit-md-preview a { color: var(--bs-info); }
</style>
{% endblock %}

{% block content %}
<div class="pql-nbedit-root"
     x-data="notebookEditor({
         path: {{ notebook_path|tojson }},
         initial: {{ initial_document|tojson }},
     })"
     x-init="mount()">
    <div class="pql-nbedit-toolbar">
        <span class="pql-nbedit-path" x-text="path"></span>
        <span class="pql-nbedit-status small"
              x-text="{
                  'saved': 'Saved',
                  'saving': 'Saving…',
                  'pending': 'Unsaved changes',
                  'error': 'Save failed',
                  'idle': '',
              }[saveState]"
              :class="{
                  'text-success': saveState === 'saved',
                  'text-warning': saveState === 'pending' || saveState === 'saving',
                  'text-danger': saveState === 'error',
              }"></span>
        <span class="small"
              x-text="{
                  'connecting': 'Connecting kernel…',
                  'ready': 'Kernel ready',
                  'restarting': 'Restarting…',
                  'disconnected': 'Kernel disconnected',
                  'error': 'Kernel error',
              }[kernelStatus]"
              :class="{
                  'text-success': kernelStatus === 'ready',
                  'text-warning': kernelStatus === 'connecting' || kernelStatus === 'restarting',
                  'text-danger': kernelStatus === 'disconnected' || kernelStatus === 'error',
              }"></span>
        <span class="small"
              x-text="{
                  'connecting': 'Loading Pyright…',
                  'ready': 'Pyright ready',
                  'error': 'Pyright error',
                  'unavailable': 'Pyright unavailable',
              }[lspStatus]"
              :class="{
                  'text-success': lspStatus === 'ready',
                  'text-warning': lspStatus === 'connecting',
                  'text-danger': lspStatus === 'error',
                  'text-muted': lspStatus === 'unavailable',
              }"></span>
        <div class="ms-auto d-flex align-items-center gap-2">
            <button type="button"
                    class="btn btn-sm btn-outline-secondary"
                    @click="addCellBelow()"
                    :disabled="loading">
                <i class="bi bi-plus-lg me-1"></i>Add cell
            </button>
            <button type="button"
                    class="btn btn-sm btn-outline-secondary"
                    @click="save()"
                    :disabled="loading"
                    title="Force-flush (autosave normally handles this)">
                <i class="bi bi-save me-1"></i>Save
            </button>
            <button type="button"
                    class="btn btn-sm btn-outline-secondary"
                    @click="clearCurrentCellOutputs()"
                    title="Clear outputs of the cell at the cursor (Sprint 60: also purges persisted rows)">
                <i class="bi bi-eraser me-1"></i>Clear cell
            </button>
            <button type="button"
                    class="btn btn-sm btn-outline-warning"
                    @click="interruptKernel()"
                    :disabled="kernelStatus !== 'ready'"
                    title="Send SIGINT — raises KeyboardInterrupt in the kernel">
                <i class="bi bi-stop-fill me-1"></i>Interrupt
            </button>
            <button type="button"
                    class="btn btn-sm btn-outline-danger"
                    @click="restartKernel()"
                    :disabled="kernelStatus !== 'ready' && kernelStatus !== 'error' && kernelStatus !== 'disconnected'"
                    title="Restart the kernel and clear all outputs">
                <i class="bi bi-arrow-clockwise me-1"></i>Restart
            </button>
            <button type="button"
                    class="btn btn-sm btn-primary"
                    @click="runCurrentCell()"
                    :disabled="kernelStatus !== 'ready'"
                    title="Run cell at cursor (Shift+Enter)">
                <i class="bi bi-play-fill me-1"></i>Run cell
            </button>
        </div>
    </div>
    <div class="pql-nbedit-editor" x-ref="editor"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/vendor/monaco/vs/loader.js"></script>
<script src="/static/js/notebook_editor.js"></script>
{% endblock %}
