{% extends "base.html" %}
{# Phase 112 — Notebook editor opts in to the right meta panel.
   ``meta_panel_target`` tells base.html to render the empty
   ``<aside id="pql-meta-panel">`` as a target; the content lives
   inside the ``notebookEditor()`` x-data wrapper below and is
   moved into the aside via Alpine's ``<template x-teleport>`` so
   it stays inside the editor's reactive scope. #}
{% set meta_panel_target = True %}
{% block title %}{{ notebook_path }} · Notebook · PointlesSQL{% endblock %}

{% set breadcrumbs = [
 {"label": "Home", "href": "/"},
 {"label": "Workspace", "href": "/notebooks/workspace"},
 {"label": notebook_path}
] %}
{% block breadcrumbs %}{% include "components/breadcrumbs.html" %}{% endblock %}

{% block extra_css %}
{{ super() }}
<link rel="stylesheet" href="/static/css/notebook.css?v={{ asset_version }}">
{% endblock %}

{# Phase 113.5 — lock the body scroll for the notebook editor.
   Without this the rail/ctx/meta sticky elements get released from
   their containing block when scrolling near the document bottom
   (sticky's spec behaviour), and the rail visually lifts above the
   topbar.  Shell-locked layout (body height=100vh, content scrolls
   internally) matches VSCode/JupyterLab/Cursor patterns and keeps
   every side panel rock-solid regardless of cell count. #}
{% block body_data_attrs %}data-pql-shell-locked="1"{% endblock %}

{% block content %}
<div class="pql-notebook-shell"
     x-data='notebookEditor({
       initialPath: {{ notebook_path | tojson }},
       currentUser: {
         id: {{ current_user_id | tojson }},
         name: {{ current_user_name | tojson }},
         email: {{ current_user_email | tojson }}
       }
     })'
     x-init="init()"
     @beforeunload.window="destroy()"
     @pql:cell-tag-changed="dirty = true; _scheduleAutosave && _scheduleAutosave()">


 {% include "pages/_partials/notebook_editor/toolbar.html" %}

 {# Phase 112 — Meta panel (right rail).  Teleports into the
    empty ``#pql-meta-panel .pql-meta-panel__inner`` rendered by
    base.html so the sections read the surrounding x-data scope. #}
 <template x-teleport="#pql-meta-panel .pql-meta-panel__inner">
  {% include "pages/_partials/notebook_editor/meta_panel.html" %}
 </template>

 {% include "pages/_partials/notebook_editor/replays_panel.html" %}

 {% include "pages/_partials/notebook_editor/sequence_proposals_drawer.html" %}

 {% include "pages/_partials/notebook_editor/widgets_panel.html" %}

 {# Revisions stays a fixed inline drawer because its diff +
    cell-facts-pin UI needs more than the 280 px meta-panel
    column. It's now opened from the meta-panel "See all & diff"
    button via ``toggleRevisionsPanel()``. #}
 {% include "pages/_partials/notebook_editor/revisions_panel.html" %}

 {% include "pages/_partials/notebook_editor/right_drawer.html" %}

 <div class="pql-notebook-error"
      x-show="errorMessage"
      x-cloak
      x-text="errorMessage"></div>

 {% include "pages/_partials/notebook_editor/jobs_panel.html" %}

 <div class="pql-notebook-empty"
      x-show="!loading && !errorMessage && cells.length === 0"
      x-cloak>
  This notebook is empty.
  <div class="mt-2">
   <button type="button" class="btn btn-sm btn-primary"
           @click="addCellAtEnd('code')">
    <i class="bi bi-plus-lg" aria-hidden="true"></i> Add code cell
   </button>
  </div>
 </div>

 <template x-for="cell in cells" :key="cell.id">
  <div class="pql-notebook-cell"
       x-data='cellThread({
         notebookUuid: notebookUuid,
         cell: cell,
         initialCounts: cellCountsFor(cell),
         curatedTags: {{ curated_cell_tags|tojson }}
       })'
       x-effect="applyCounts(cellCountsFor(cell))"
       :class="{ 'pql-notebook-cell--dragging': dragState.draggingCellId === cell.id }"
       :data-cell-id="cell.id"
       @dragover.prevent="onCellDragOver($event, cell)"
       @drop.prevent="onCellDrop($event, cell)">
   {# Phase 115 — entire cell header acts as a desktop-window-style
      drag handle.  Buttons / dropdowns / inputs inside the header
      stay interactive (click and drag are distinct gestures; HTML5
      DnD does not block button clicks).  The result-var ``<input>``
      below is the one element that needs ``draggable="false"`` so
      its text-selection drag wins over the header drag. #}
   <div class="pql-notebook-cell__header"
        draggable="true"
        data-testid="cell-header-drag-handle"
        @dragstart="onCellDragStart($event, cell)"
        @dragend="onCellDragEnd($event)">
    <div class="d-flex align-items-center gap-2">
     {# Phase 95.x layout — Run button moved to the very left of the
        cell header, before the type-pill, so the kernel-action sits
        where the eye lands first when scanning a notebook.

        Phase 113.6 — converted to a Bootstrap split-button: main
        action runs the cell as before; the caret opens a dropdown
        with above/below variants relative to THIS cell (no need to
        track focus separately).  Markdown cells get the plain Run
        button only (no caret), since none of the variants makes
        sense there. #}
     <template x-if="cell.cell_type === 'markdown'">
      <button type="button"
              class="btn btn-sm btn-outline-success"
              disabled
              title="Markdown cells render in-place; nothing to run">
       <i class="bi bi-play-fill" aria-hidden="true"></i>
       Run
      </button>
     </template>
     <template x-if="cell.cell_type !== 'markdown'">
      <div class="btn-group" role="group" aria-label="Run cell">
       <button type="button"
               class="btn btn-sm btn-outline-success"
               @click="runCell(cell)"
               :disabled="kernelStatus !== 'ready' || runAllInProgress"
               title="Run this cell (Cmd/Ctrl+Enter)">
        <i class="bi bi-play-fill" aria-hidden="true"></i>
        Run
       </button>
       <button type="button"
               class="btn btn-sm btn-outline-success dropdown-toggle dropdown-toggle-split"
               data-bs-toggle="dropdown"
               aria-expanded="false"
               :disabled="kernelStatus !== 'ready' || runAllInProgress"
               data-testid="cell-run-caret"
               title="Run variants for this cell">
        <span class="visually-hidden">Toggle run dropdown</span>
       </button>
       <ul class="dropdown-menu">
        <li>
         <button class="dropdown-item" type="button"
                 @click="runCell(cell)">
          <i class="bi bi-play-fill me-2"></i>Run this cell
         </button>
        </li>
        <li>
         <button class="dropdown-item" type="button"
                 @click="runCellAndAdvance(cell)">
          <i class="bi bi-play-fill me-2"></i>Run this + advance
         </button>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
         <button class="dropdown-item" type="button"
                 :disabled="cells.findIndex(c => c.id === cell.id) <= 0"
                 @click="runAllAbove(cell)">
          <i class="bi bi-arrow-bar-up me-2"></i>Run all above this cell
         </button>
        </li>
        <li>
         <button class="dropdown-item" type="button"
                 @click="runAllBelow(cell)">
          <i class="bi bi-arrow-bar-down me-2"></i>Run this cell + all below
         </button>
        </li>
       </ul>
      </div>
     </template>
     <span class="pql-notebook-cell__type-pill"
           :data-cell-type="cell.cell_type"
           x-text="cellLabel(cell)"></span>
     <span class="text-muted small"
           :title="cell.content_hash"
           x-text="`[${cell.exec_count != null ? cell.exec_count : ' '}]`"></span>
     <span class="text-muted small font-monospace"
           x-show="runDurationFor(cell)"
           x-text="runDurationFor(cell)"
           x-cloak
           title="Wall-clock duration of the most recent run"></span>
     <template x-if="cell.cell_type === 'sql'">
      <div class="d-flex align-items-center gap-1">
       <span class="text-muted small">→</span>
       <input type="text"
              class="form-control form-control-sm pql-notebook-cell__result-var"
              :value="cell.result_var || 'df'"
              @change="cell.result_var = $event.target.value || 'df'; cell._dirty = true; dirty = true"
              placeholder="df"
              title="Name to bind the resulting DataFrame to in the kernel namespace"
              size="6"
              {# Phase 115 — let text-selection drag inside the input
                 win over the header-as-drag-handle behaviour. #}
              draggable="false">
      </div>
     </template>
    </div>
    <div class="d-flex align-items-center gap-2">
     <span class="text-muted"
           x-show="cell._dirty"
           title="Cell modified since last save">●</span>
     {# Phase 101 — per-cell author chip.  Hidden when no
        authorship row is known for this cell yet (un-saved cells
        + cells from before Phase 101 shipped).  Methods live on
        the outer notebookEditor scope so we don't pay for a
        nested x-data per cell. #}
     <span class="pql-cell-author-chip text-muted small"
           x-show="shouldShowAuthorChip(cell)"
           x-cloak
           :title="authorChipTooltip(cell)">
      <i class="bi" :class="authorChipIcon(cell)" aria-hidden="true"></i>
      <span x-text="authorChipLabel(cell)"></span>
     </span>
     {# Phase 98.C Wave-D / Sprint 113.1 — lineage chips capped at 1.
        Tail badges roll into a ``+N more`` overflow chip whose
        tooltip lists every additional target table; the full list
        also re-appears as a read-only section inside the per-cell
        ⋯ overflow menu below. #}
     <template x-if="lineageFor(cell).length > 0">
      <span class="d-inline-flex align-items-center gap-1"
            data-testid="cell-lineage-strip">
       <template x-for="badge in lineageFor(cell).slice(0, 1)" :key="`${badge.op_name}|${badge.target_table}`">
        <span class="badge bg-info-subtle text-info-emphasis"
              style="font-size: 0.65rem;"
              :title="`${badge.op_name} → ${badge.target_table || '(none)'}\n${badge.rows_affected != null ? badge.rows_affected + ' rows · ' : ''}${badge.delta_version_after != null ? 'v' + badge.delta_version_after + ' · ' : ''}${badge.started_at}`">
         <i class="bi bi-diagram-2 me-1" aria-hidden="true"></i>
         <span x-text="badge.target_table || badge.op_name"></span>
        </span>
       </template>
       <template x-if="lineageFor(cell).length > 1">
        <span class="badge bg-info-subtle text-info-emphasis pql-cell-lineage-overflow"
              data-testid="cell-lineage-overflow"
              :title="lineageOverflowTitle(cell)"
              x-text="`+${lineageFor(cell).length - 1} more`"></span>
       </template>
      </span>
     </template>
     {# Phase 97 Rest — per-cell pinned-fact 📌 chip.  Lit when at
        least one active cell-output fact references this cell's
        content_hash; click on a lit chip unpins the newest fact;
        click on an unlit chip opens the inline pin dialog in the
        revisions drawer.  Same outer-scope dodge as the lineage
        chip strip above. #}
     <button type="button"
             class="btn btn-sm"
             :class="factsFor(cell).length > 0
                     ? 'btn-outline-warning'
                     : 'btn-outline-secondary'"
             style="--bs-btn-padding-y: .15rem; --bs-btn-padding-x: .35rem; --bs-btn-font-size: .7rem;"
             @click="factsFor(cell).length > 0
                     ? unpinCellFact(cell)
                     : openCellFactDialog(cell)"
             data-testid="cell-fact-chip"
             :title="factsFor(cell).length > 0
                     ? `Click to unpin (${factsFor(cell)[0].title})`
                     : 'Pin this cell output as a fact'">
      <i class="bi bi-pin-angle-fill" aria-hidden="true"></i>
      <span x-show="factsFor(cell).length > 0" x-cloak
            class="ms-1" x-text="factsFor(cell).length"></span>
     </button>
     {# Phase 95.3 — Tag-picker toggle.  Lives in the right cluster
        flush with the social chip + run cluster so all per-cell
        action buttons sit together on the right edge. #}
     {% include "pages/_partials/notebook_editor/cell_tag_picker.html" %}
     {# Phase 95.2 — 💬 chip toggles the inline cell-thread below.
        Cells minted before Phase 95 carry no ``cell_uuid``; the
        save-path reconciler assigns one.  The chip stays visible
        either way — first click on an un-saved cell fires a save
        and only then expands the thread. #}
     <button type="button"
             class="btn btn-sm pql-cell-thread__chip"
             :class="hasActivity ? 'btn-outline-primary' : 'btn-outline-secondary'"
             @click="cell.cell_uuid ? toggle() : save().then(() => toggle())"
             :aria-expanded="open"
             title="Toggle comments / reactions / followers for this cell">
      <i class="bi bi-chat-dots" aria-hidden="true"></i>
      <span x-show="commentCount > 0" x-cloak
            class="ms-1" x-text="commentCount"></span>
     </button>
     {# Phase 101 Wave-D — per-cell Review affordance.  Opens the
        review composer inside the cell-thread drawer (gated on a
        minted cell_uuid, same as the 💬 chip).  The green ✓ count
        surfaces approved reviews; the orange ⚠ count surfaces
        changes-requested.  Both badges hidden at zero. #}
     <button type="button"
             class="btn btn-sm pql-cell-thread__review-chip"
             :class="approvedReviewCount > 0 ? 'btn-outline-success' : (changesRequestedCount > 0 ? 'btn-outline-warning' : 'btn-outline-secondary')"
             @click="cell.cell_uuid ? toggleReviewComposer() : save().then(() => toggleReviewComposer())"
             :aria-expanded="reviewComposerOpen"
             data-testid="cell-review-chip"
             title="Post a review decision for this cell">
      <i class="bi bi-clipboard-check" aria-hidden="true"></i>
      <span x-show="approvedReviewCount > 0" x-cloak
            class="ms-1 text-success" x-text="`✓${approvedReviewCount}`"></span>
      <span x-show="changesRequestedCount > 0" x-cloak
            class="ms-1 text-warning" x-text="`⚠${changesRequestedCount}`"></span>
     </button>
     {# Sprint 113.1 — single ⋯ overflow menu replaces the former
        type-dropdown + history-toggle + 5-button move/insert/delete
        cluster (15 → 1 visible affordance per cell).  All click
        handlers live on the outer notebookEditor() scope so this
        block adds no new x-data layer. #}
     <div class="dropdown">
      <button class="btn btn-sm btn-outline-secondary"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              data-testid="cell-overflow-toggle"
              title="More cell actions">
       <i class="bi bi-three-dots" aria-hidden="true"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end pql-cell-overflow-menu">
       <li><h6 class="dropdown-header">Cell type</h6></li>
       <li>
        <button class="dropdown-item" type="button"
                @click="convertCellType(cell, 'code')">
         <i class="bi bi-code me-2"></i>Code
         <i class="bi bi-check2 ms-2"
            x-show="cell.cell_type === 'code'"
            x-cloak></i>
        </button>
       </li>
       <li>
        <button class="dropdown-item" type="button"
                @click="convertCellType(cell, 'sql')">
         <i class="bi bi-table me-2"></i>SQL
         <i class="bi bi-check2 ms-2"
            x-show="cell.cell_type === 'sql'"
            x-cloak></i>
        </button>
       </li>
       <li>
        <button class="dropdown-item" type="button"
                @click="convertCellType(cell, 'markdown')">
         <i class="bi bi-markdown me-2"></i>Markdown
         <i class="bi bi-check2 ms-2"
            x-show="cell.cell_type === 'markdown'"
            x-cloak></i>
        </button>
       </li>
       <li>
        <button class="dropdown-item" type="button"
                @click="toggleParamsTag(cell)">
         <span x-show="!cellHasParamsTag(cell)" x-cloak>
          <i class="bi bi-sliders me-2"></i>Mark as parameters
         </span>
         <span x-show="cellHasParamsTag(cell)" x-cloak>
          <i class="bi bi-x-circle me-2"></i>Unmark parameters
         </span>
        </button>
       </li>
       <li><hr class="dropdown-divider"></li>
       <li><h6 class="dropdown-header">View</h6></li>
       <li>
        <button class="dropdown-item" type="button"
                @click="toggleHistoryFor(cell)">
         <i class="bi bi-clock-history me-2"></i>Show last 5 runs
        </button>
       </li>
       <li><hr class="dropdown-divider"></li>
       <li><h6 class="dropdown-header">Structure</h6></li>
       <li>
        <button class="dropdown-item" type="button"
                @click="addCellAbove(cell)">
         <i class="bi bi-arrow-bar-up me-2"></i>Insert cell above
        </button>
       </li>
       <li>
        <button class="dropdown-item" type="button"
                @click="addCellBelow(cell)">
         <i class="bi bi-arrow-bar-down me-2"></i>Insert cell below
        </button>
       </li>
       <li>
        <button class="dropdown-item" type="button"
                @click="moveCellUp(cell)">
         <i class="bi bi-chevron-up me-2"></i>Move up
        </button>
       </li>
       <li>
        <button class="dropdown-item" type="button"
                @click="moveCellDown(cell)">
         <i class="bi bi-chevron-down me-2"></i>Move down
        </button>
       </li>
       <li><hr class="dropdown-divider"></li>
       <li>
        <button class="dropdown-item text-danger" type="button"
                @click="deleteCell(cell)"
                data-testid="cell-delete-item">
         <i class="bi bi-trash me-2"></i>Delete cell
        </button>
       </li>
       <template x-if="lineageFor(cell).length > 1">
        <li>
         <hr class="dropdown-divider">
        </li>
       </template>
       <template x-if="lineageFor(cell).length > 1">
        <li><h6 class="dropdown-header">Lineage</h6></li>
       </template>
       <template x-for="badge in lineageFor(cell)" :key="`${badge.op_name}|${badge.target_table}`">
        <template x-if="lineageFor(cell).length > 1">
         <li>
          <div class="dropdown-item-text small">
           <i class="bi bi-diagram-2 me-2" aria-hidden="true"></i>
           <span x-text="badge.op_name"></span>
           <span class="text-muted"> → </span>
           <span x-text="badge.target_table || '(none)'"></span>
           <div class="text-muted ps-4"
                x-text="`${badge.rows_affected != null ? badge.rows_affected + ' rows · ' : ''}${badge.delta_version_after != null ? 'v' + badge.delta_version_after + ' · ' : ''}${badge.started_at || ''}`"></div>
          </div>
         </li>
        </template>
       </template>
      </ul>
     </div>
    </div>
   </div>
   <template x-if="cell.cell_type === 'markdown' && cell.view_mode">
    <div class="pql-notebook-cell__markdown-view"
         tabindex="0"
         @click="enterMarkdownEdit(cell)"
         @keydown.enter.prevent="enterMarkdownEdit(cell)"
         x-html="cell._renderedHtml || '<em class=\'text-muted\'>Empty markdown cell — click to edit.</em>'"></div>
   </template>
   <template x-if="!(cell.cell_type === 'markdown' && cell.view_mode)">
    <div class="pql-notebook-cell__editor"
         :id="`pql-cell-host-${cell.id}`"
         @keydown.shift.enter.prevent="cell.cell_type === 'markdown' ? exitMarkdownEdit(cell) : runCellAndAdvance(cell)"
         @keydown.ctrl.enter.prevent="runCell(cell)"
         @keydown.meta.enter.prevent="runCell(cell)"
         @keydown.escape="cell.cell_type === 'markdown' ? exitMarkdownEdit(cell) : null"></div>
   </template>
   <div class="pql-notebook-cell__output-zone"
        :class="{ 'pql-notebook-cell__output-zone--ran': cell.exec_count != null }">
    <div class="pql-notebook-cell__output-label"
         x-show="cell.exec_count != null"
         x-cloak>
     <span x-text="`Out[${cell.exec_count}]:`"></span>
     <button type="button"
             class="btn btn-link btn-sm p-0 ms-auto text-muted"
             @click="_clearOutput(cell)"
             title="Clear output for this cell (does not re-run)">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
      <span class="visually-hidden">Clear output</span>
     </button>
    </div>
    <div class="pql-notebook-cell__output"
         :id="`pql-cell-output-${cell.id}`"></div>
   </div>
   {% include "pages/_partials/notebook_editor/cell_tag_picker_panel.html" %}
   {% include "pages/_partials/notebook_editor/cell_thread.html" %}
   <template x-if="historyOpenFor === cell.id">
    <div class="pql-notebook-cell__history">
     <div class="pql-notebook-cell__history-header">
      <strong>Last runs</strong>
      <button type="button" class="btn-close btn-close-sm"
              @click="historyOpenFor = null"
              aria-label="Close"></button>
     </div>
     <template x-if="historyForCell(cell).length === 0">
      <div class="text-muted small">No prior runs for this cell.</div>
     </template>
     <ul class="list-unstyled mb-0">
      <template x-for="run in historyForCell(cell)" :key="run.id">
       <li class="pql-notebook-cell__history-row">
        <span class="badge"
              :class="{
                'bg-success': run.status === 'ok',
                'bg-danger': run.status === 'error',
                'bg-warning': run.status === 'aborted',
                'bg-secondary': run.status === 'running'
              }"
              x-text="run.status"></span>
        <span class="text-muted small"
              x-text="run.execution_count != null ? `[${run.execution_count}]` : '[ ]'"></span>
        <span class="text-muted small flex-grow-1"
              x-text="pqlRelativeTime(run.started_at)"
              :title="pqlAbsTime(run.started_at)"></span>
       </li>
      </template>
     </ul>
    </div>
   </template>
  </div>
 </template>

 <div class="pql-notebook-add-row"
      x-show="!loading && !errorMessage && cells.length > 0"
      x-cloak>
  <div class="btn-group btn-group-sm" role="group">
   <button type="button" class="btn btn-outline-secondary"
           @click="addCellAtEnd('code')">
    <i class="bi bi-plus-lg" aria-hidden="true"></i> Code cell
   </button>
   <button type="button" class="btn btn-outline-secondary"
           @click="addCellAtEnd('sql')">
    <i class="bi bi-plus-lg" aria-hidden="true"></i> SQL cell
   </button>
   <button type="button" class="btn btn-outline-secondary"
           @click="addCellAtEnd('markdown')">
    <i class="bi bi-plus-lg" aria-hidden="true"></i> Markdown cell
   </button>
  </div>
 </div>

 {% include "pages/_partials/notebook_editor/run_modal.html" %}
</div>

{% include "pages/_partials/notebook_editor/scripts.html" %}
{% endblock %}
