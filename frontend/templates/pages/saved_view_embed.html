<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ view.title }} · embed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <meta name="csrf-token" content="{{ request.state.csrf_token }}">
    <style>
        body { padding: 1rem; }
        .embed-header { border-bottom: 1px solid #dee2e6; padding-bottom: 0.5rem; margin-bottom: 1rem; }
        [x-cloak] { display: none !important; }
    </style>
    <script>
    // Inline minimal pqlApi: the embed page deliberately avoids the
    // full bootstrap.js / CodeMirror chain so an iframe stays cheap.
    async function _embedFetch(url, init) {
        const opts = Object.assign({}, init || {});
        if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
            opts.headers = Object.assign(
                { 'Content-Type': 'application/json' },
                opts.headers || {},
            );
            opts.body = JSON.stringify(opts.body);
        }
        const verb = (opts.method || 'GET').toUpperCase();
        if (verb !== 'GET' && verb !== 'HEAD') {
            const m = document.querySelector('meta[name="csrf-token"]');
            const token = m ? m.content : '';
            if (token) {
                opts.headers = Object.assign({}, opts.headers || {});
                opts.headers['X-CSRF-Token'] = token;
            }
        }
        try {
            const res = await fetch(url, opts);
            const ct = res.headers.get('content-type') || '';
            const data = /\bjson\b/.test(ct) ? await res.json() : null;
            return { ok: res.ok, status: res.status, data, error: res.ok ? null : 'HTTP ' + res.status };
        } catch (e) {
            return { ok: false, status: 0, data: null, error: e.message || 'Network error' };
        }
    }
    window.pqlApi = { fetch: _embedFetch };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body>
    <div x-data='savedViewEmbed({{ view | tojson }})' x-init="run()">
        <div class="embed-header d-flex justify-content-between align-items-center">
            <div>
                <strong x-text="view.title"></strong>
                <template x-if="view.description">
                    <span class="text-muted small ms-2" x-text="view.description"></span>
                </template>
            </div>
            <a class="small text-decoration-none"
               :href="'/views/' + view.slug" target="_top">Open full ↗</a>
        </div>

        <div class="row mb-2" x-show="(view.parameters || []).length > 0">
            <template x-for="p in (view.parameters || [])" :key="p.name">
                <div class="col-auto mb-2">
                    <label class="form-label small mb-0" x-text="p.label || p.name"></label>
                    <input class="form-control form-control-sm" x-model="values[p.name]"
                           :type="p.type === 'date' ? 'date' : (p.type === 'integer' || p.type === 'number' ? 'number' : 'text')"
                           style="min-width: 10rem;">
                </div>
            </template>
            <div class="col-auto align-self-end mb-2">
                <button class="btn btn-primary btn-sm" @click="run()" :disabled="running">Run</button>
            </div>
        </div>

        <template x-if="error">
            <div class="alert alert-danger small" x-text="error"></div>
        </template>

        <div class="table-responsive" style="max-height: 80vh; overflow: auto;">
            <table class="table table-sm table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <template x-for="c in (result ? result.columns : [])" :key="c.name">
                            <th class="text-nowrap small" x-text="c.name"></th>
                        </template>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, ridx) in (result ? result.rows : [])" :key="ridx">
                        <tr>
                            <template x-for="(cell, cidx) in row" :key="cidx">
                                <td class="text-nowrap small" x-text="cell"></td>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

<script>
function savedViewEmbed(view) {
    const initial = {};
    (view.parameters || []).forEach(p => {
        initial[p.name] = (p.default !== null && p.default !== undefined) ? p.default : '';
    });
    return {
        view, values: initial, running: false, result: null, error: null,
        async run() {
            this.error = null; this.running = true;
            const res = await window.pqlApi.fetch('/api/views/' + this.view.slug + '/run', {
                method: 'POST', body: { parameters: this.values }
            });
            this.running = false;
            if (res.ok && res.data) this.result = res.data;
            else this.error = (res.data && res.data.detail) || res.error || 'Run failed';
        }
    };
}
window.savedViewEmbed = savedViewEmbed;
</script>
</body>
</html>
