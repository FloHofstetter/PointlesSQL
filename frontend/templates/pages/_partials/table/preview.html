 <div class="tab-pane fade" id="tab-preview" role="tabpanel" aria-labelledby="tab-preview-btn">
 <div class="card mb-4"
 x-data="tablePreview('{{ catalog_name }}.{{ schema_name }}.{{ table_name }}')"
 x-init="load(); loadVersions();">
 <div class="card-header d-flex align-items-center justify-content-between gap-2 flex-wrap">
 <span>Preview{{ info('tables.row-lineage-badge') }}</span>
 <div class="d-flex align-items-center gap-2 flex-wrap">
 <label class="text-muted small mb-0" for="version-select-{{ table_name }}">
 <i class="bi bi-clock-history me-1"></i>View at{{ info('tables.time-travel-button') }}
 </label>
 <select id="version-select-{{ table_name }}"
 class="form-select form-select-sm"
 style="width: auto;"
 x-model.number="selectedVersion"
 @change="onVersionChange()">
 <option :value="null">current</option>
 <template x-for="v in versions" :key="v.version">
 <option :value="v.version"
 x-text="`v${v.version}` + (v.timestamp ? ` (${pqlAbsTime(v.timestamp).slice(0, 10)})` : '') + (v.run_id ? ` — run ${v.run_id.slice(0,8)}…` : '')">
 </option>
 </template>
 </select>
 <span class="text-muted small" x-show="ready">
 <span x-text="rows.length"></span> <span x-text="rows.length === 1 ? 'row' : 'rows'"></span>
 </span>
 </div>
 </div>
 <div class="card-body p-0">
 <template x-if="loading">
 <div class="p-3 text-muted small">
 <span class="spinner-border spinner-border-sm me-2" role="status"></span>
 Loading preview…
 </div>
 </template>
 <template x-if="error">
 <div class="p-3 small">
 <div class="text-muted fst-italic">
 <i class="bi bi-exclamation-triangle me-1"></i>
 Preview unavailable: <span x-text="error"></span>
 </div>
 <template x-if="errorKind === 'missing_storage'">
 <div class="mt-2 text-muted">
 <i class="bi bi-info-circle me-1"></i>
 <strong>What to check:</strong>
 the data may have been moved, deleted, or
 never landed at this path. Update the
 table's <code>storage_location</code> to point
 at the current location, restore the data at
 the path above, or drop the table from the
 catalog if it's no longer needed.
 </div>
 </template>
 </div>
 </template>
 <template x-if="ready && rows.length === 0">
 <div class="p-3 text-muted small fst-italic">Table is empty.</div>
 </template>
 <template x-if="ready && rows.length > 0">
 <div class="table-responsive">
 <table class="table table-sm mb-0 align-middle pql-list-table">
 <thead>
 <tr>
 <template x-for="col in columns" :key="col">
 <th class="font-monospace small" x-text="col"></th>
 </template>
 </tr>
 </thead>
 <tbody>
 <template x-for="(row, i) in rows" :key="i">
 <tr>
 <template x-for="(cell, j) in row" :key="j">
 <td class="small" :data-label="columns[j]">
 <template x-if="columns[j] === '_lineage_row_id' && cell">
 <a :href="`/catalogs/{{ catalog_name }}/schemas/{{ schema_name }}/tables/{{ table_name }}/rows/${encodeURIComponent(cell)}/trace`"
 class="font-monospace small text-decoration-none"
 title="Walk this row's lineage back to the bronze cell that produced it">
 <i class="bi bi-arrow-up-right-square me-1"></i><span x-text="String(cell).slice(0, 12) + '…'"></span>
 </a>
 </template>
 <template x-if="!(columns[j] === '_lineage_row_id' && cell)">
 <span x-text="cell === null ? '—' : String(cell)"></span>
 </template>
 </td>
 </template>
 </tr>
 </template>
 </tbody>
 </table>
 </div>
 </template>
 </div>
 </div>

 {# ``window.tablePreview`` is registered in
 ``frontend/js/bootstrap.js`` (loaded as a module before
 Alpine), so the factory is already on ``window`` when Alpine
 walks the DOM after an HTMX boost. No inline ``<script>``
 block needed here. #}

 </div>
