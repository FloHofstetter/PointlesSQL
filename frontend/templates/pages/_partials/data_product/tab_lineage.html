        <div class="tab-pane fade" id="tab-lineage" role="tabpanel">
            <!-- Declared upstream (input ports) — the contract-declared
                 dependency graph alongside the runtime-captured edges. -->
            <div class="card mb-3"
                 x-data='dataProductPortsPanel({{ product.catalog|tojson }}, {{ product.schema|tojson }}, false)'
                 x-show="inputPorts.length > 0" x-cloak>
                <div class="card-header d-flex align-items-center gap-2">
                    <i class="bi bi-box-arrow-in-down"></i>
                    <span>Declared upstream</span>
                </div>
                <ul class="list-group list-group-flush">
                    <template x-for="p in inputPorts" :key="p.id">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>
                                <span class="badge text-bg-secondary me-1" x-text="p.kind"></span>
                                <strong x-text="p.name"></strong>
                                <template x-if="upstreamHref(p)">
                                    <a class="ms-1" :href="upstreamHref(p)"><code x-text="p.source_ref"></code></a>
                                </template>
                                <template x-if="!upstreamHref(p) && p.source_ref">
                                    <code class="ms-1" x-text="p.source_ref"></code>
                                </template>
                            </span>
                        </li>
                    </template>
                </ul>
            </div>

            <div id="dp-cy" style="width: 100%; height: 600px;" x-show="lineageLoaded"></div>
            <template x-if="!lineageLoaded">
                <div class="text-muted small p-3">
                    <span class="spinner-border spinner-border-sm me-1"></span>Loading lineage graph…
                </div>
            </template>
            <template x-if="lineageEmpty">
                <div class="alert alert-secondary">
                    <i class="bi bi-info-circle me-1"></i>
                    No lineage edges recorded yet for this product's tables.
                </div>
            </template>
        </div>
