        <div class="tab-pane fade" id="tab-activity" role="tabpanel">
            <template x-if="!activityLoaded">
                <div class="text-muted small p-3">Loading…</div>
            </template>
            <template x-if="activityLoaded && activity.length === 0">
                <div class="alert alert-secondary pql-activity-empty">
                    <i class="bi bi-clock-history me-1"></i>
                    No activity yet — the feed merges agent ops,
                    audit log writes, contract validations, and
                    freshness events as they happen.
                </div>
            </template>
            <template x-if="activityLoaded && activity.length > 0">
                <div class="card pql-activity-list">
                    <div class="table-responsive">
                        <table class="table table-sm table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>When</th>
                                    <th>Kind</th>
                                    <th>Summary</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="a in activity" :key="a.kind + '-' + a.source_id">
                                    <tr class="pql-activity-row"
                                        :data-activity-kind="a.kind"
                                        :data-activity-id="a.source_id">
                                        <td class="small text-muted text-nowrap"
                                            x-text="pqlRelativeTime(a.ts)"
                                            :title="pqlAbsTime(a.ts)"></td>
                                        <td>
                                            <span class="badge"
                                                  :class="{
                                                      'bg-primary': a.kind === 'agent_op',
                                                      'bg-secondary': a.kind === 'audit',
                                                      'bg-warning text-dark': a.kind === 'contract',
                                                      'bg-danger': a.kind === 'freshness',
                                                  }"
                                                  x-text="a.kind"></span>
                                        </td>
                                        <td>
                                            <a :href="a.source_url"
                                               class="text-decoration-none"
                                               x-text="a.summary"></a>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>
