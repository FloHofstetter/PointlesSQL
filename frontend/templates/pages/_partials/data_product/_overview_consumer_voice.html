<div class="card mb-3"
     x-data='dataProductUseCasesPanel({{ product.catalog|tojson }}, {{ product.schema|tojson }}, {{ ((current_user.id if current_user else 0))|tojson }})'>
    <div class="card-header d-flex align-items-center gap-2">
        <i class="bi bi-chat-square-quote"></i>
        <span>Use cases</span>
        <span class="badge text-bg-light text-dark border ms-auto"
              x-text="useCases.length + ' contributed'"></span>
    </div>
    <div class="card-body">
        <div class="alert alert-danger py-1 px-2 small" x-show="error" x-text="error" x-cloak></div>

        <ul class="list-unstyled mb-3" x-show="useCases.length > 0" x-cloak>
            <template x-for="uc in useCases.slice(0, 5)" :key="uc.id">
                <li class="border-start ps-2 mb-2 small">
                    <div class="d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-2"
                                @click="vote(uc.id)">
                            <i class="bi bi-arrow-up-short"></i>
                            <span x-text="uc.votes"></span>
                        </button>
                        <strong x-text="uc.title"></strong>
                    </div>
                    <div class="text-muted mt-1" x-text="uc.body"></div>
                </li>
            </template>
        </ul>
        <div class="text-muted small mb-3" x-show="useCases.length === 0" x-cloak>
            No use cases shared yet. Be the first to describe how your team uses this product.
        </div>

        <form @submit.prevent="add()" class="small">
            <div class="row g-2">
                <div class="col-12 col-md-4">
                    <input class="form-control form-control-sm"
                           placeholder="Short title"
                           x-model="draft.title"
                           required>
                </div>
                <div class="col">
                    <input class="form-control form-control-sm"
                           placeholder="How do you use this product?"
                           x-model="draft.body"
                           required>
                </div>
                <div class="col-12 col-md-auto">
                    <button type="submit" class="btn btn-sm btn-primary w-100">Share</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card mb-3"
     x-data='dataProductRatingWidget({{ product.catalog|tojson }}, {{ product.schema|tojson }}, {{ ((current_user.id if current_user else 0))|tojson }})'>
    <div class="card-header d-flex align-items-center gap-2">
        <i class="bi bi-star"></i>
        <span>Rating</span>
        <span class="ms-auto small">
            <strong x-text="summary.avg !== null ? summary.avg.toFixed(1) : '—'"></strong>
            <span class="text-muted">/ 5 · <span x-text="summary.count"></span> rater(s)</span>
        </span>
    </div>
    <div class="card-body small">
        <div class="alert alert-danger py-1 px-2 small" x-show="error" x-text="error" x-cloak></div>
        <form @submit.prevent="save()" class="d-flex align-items-center gap-2">
            <label class="text-muted">Your rating:</label>
            <template x-for="n in [1,2,3,4,5]" :key="n">
                <button type="button" class="btn btn-sm py-0 px-1"
                        :class="myScore >= n ? 'btn-warning' : 'btn-outline-secondary'"
                        @click="myScore = n">★</button>
            </template>
            <input class="form-control form-control-sm flex-grow-1"
                   placeholder="Optional comment"
                   x-model="myComment">
            <button type="submit" class="btn btn-sm btn-primary" :disabled="!myScore">Save</button>
        </form>
    </div>
</div>
