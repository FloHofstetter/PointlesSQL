<div class="card mb-3"
     x-data='dataProductLifecyclePanel({{ product.catalog|tojson }}, {{ product.schema|tojson }}, {{ ((is_admin or is_steward) or false)|tojson }})'>
    <div class="card-header d-flex align-items-center gap-2">
        <i class="bi bi-arrow-repeat"></i>
        <span>Lifecycle</span>
        <span class="badge ms-auto" :class="badgeClass()" x-text="state || 'unknown'"></span>
    </div>
    <div class="card-body">
        <div class="alert alert-danger py-1 px-2 small" x-show="error" x-text="error" x-cloak></div>
        <div class="d-flex align-items-center gap-2 mb-2" x-show="changedAt" x-cloak>
            <i class="bi bi-clock-history text-muted small"></i>
            <span class="small text-muted">
                Changed <span x-text="changedAt"></span>
            </span>
            <template x-if="replacement">
                <span class="small text-muted ms-2">
                    Replacement:
                    <a :href="'/data-products/' + replacement.replace('.', '/')"
                       x-text="replacement"></a>
                </span>
            </template>
        </div>

        <div class="d-flex gap-2 flex-wrap" x-show="canManage && targets.length > 0" x-cloak>
            <template x-for="t in targets" :key="t">
                <button type="button" class="btn btn-sm btn-outline-primary"
                        @click="transition(t)"
                        x-text="targetLabel(t)"></button>
            </template>
        </div>
        <div class="text-muted small" x-show="!canManage && targets.length > 0" x-cloak>
            Steward / admin only — propose a transition via the agent surface.
        </div>

        <details class="mt-3" x-show="history.length > 0" x-cloak>
            <summary class="small text-muted">History (<span x-text="history.length"></span>)</summary>
            <ul class="list-unstyled small mt-2">
                <template x-for="(h, i) in history" :key="i">
                    <li class="border-start ps-2 mb-1 text-muted">
                        <span x-text="h.changed_at || ''"></span>:
                        <span x-text="h.from_state || 'init'"></span>
                        →
                        <strong x-text="h.to_state"></strong>
                        <span class="ms-1" x-show="h.actor_email" x-text="'by ' + h.actor_email"></span>
                    </li>
                </template>
            </ul>
        </details>
    </div>
</div>
