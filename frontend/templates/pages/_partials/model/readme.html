{# README pane — inline kind-agnostic x-data.  Talks to the
   polymorphic /api/social/model/{ref}/readme endpoints.  No
   history / diff UX in scope here. #}
<div class="tab-pane fade" id="tab-readme" role="tabpanel"
     x-data='modelReadme({{ model.full_name|tojson }})'>
    <template x-if="!readmeLoaded">
        <div class="text-muted small p-3">Loading README…</div>
    </template>
    <template x-if="readmeLoaded && !editing">
        <div>
            <div class="d-flex justify-content-end mb-2">
                <button class="btn btn-sm btn-outline-secondary" @click="startEdit()">
                    <i class="bi bi-pencil me-1"></i>Edit README
                </button>
            </div>
            <template x-if="body">
                <div class="border rounded p-3 pql-readme-body" x-html="renderedBody"></div>
            </template>
            <template x-if="!body">
                <div class="alert alert-secondary">
                    <i class="bi bi-file-text me-1"></i>
                    No README yet — click Edit to write one (admin only).
                </div>
            </template>
        </div>
    </template>
    <template x-if="readmeLoaded && editing">
        <div>
            <textarea class="form-control mb-2" rows="14"
                      x-model="draftBody"
                      placeholder="# Heading&#10;&#10;Long-form context, training-data lineage, intended use…"></textarea>
            <div class="d-flex gap-2">
                <button class="btn btn-primary btn-sm" @click="save()" :disabled="saveBusy">
                    <i class="bi bi-check-lg me-1"></i>Save
                </button>
                <button class="btn btn-outline-secondary btn-sm" @click="cancelEdit()">
                    Cancel
                </button>
            </div>
        </div>
    </template>
</div>
