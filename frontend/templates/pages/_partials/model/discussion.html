{# Discussion pane — inline kind-agnostic x-data.  Talks to the
   polymorphic /api/social/model/{ref}/comments endpoints. #}
<div class="tab-pane fade" id="tab-discussion" role="tabpanel"
     x-data='modelDiscussion({{ model.full_name|tojson }})'
     x-init="init()">
    <template x-if="!commentsLoaded">
        <div class="text-muted small p-3">Loading discussion…</div>
    </template>
    <template x-if="commentsLoaded">
        <div>
            <template x-if="comments.length === 0">
                <div class="alert alert-secondary">
                    <i class="bi bi-chat-left-text me-1"></i>
                    No comments yet — start the discussion below.
                </div>
            </template>
            <template x-for="c in comments" :key="c.id">
                <div class="card mb-2 pql-comment-card" :data-comment-id="c.id">
                    <div class="card-body py-2">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <div class="small text-muted">
                                <strong x-text="(c.author && (c.author.display_name || c.author.email)) || 'unknown'"></strong>
                                · <span x-text="c.created_at"></span>
                            </div>
                            <button class="btn btn-sm btn-link text-danger p-0"
                                    @click="deleteComment(c.id)"
                                    title="Soft-delete this comment">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                        <div class="pql-comment-body" x-html="c.body_md_resolved || c.body_md"></div>
                    </div>
                </div>
            </template>

            <form class="mt-3" @submit.prevent="submitNew()">
                <div class="mb-2">
                    <textarea class="form-control" rows="3"
                              placeholder="Add a comment… markdown welcome"
                              x-model="draftBody"></textarea>
                </div>
                <button class="btn btn-primary btn-sm" type="submit"
                        :disabled="postBusy || !draftBody.trim()">
                    <i class="bi bi-send me-1"></i>Post
                </button>
            </form>
        </div>
    </template>
</div>
