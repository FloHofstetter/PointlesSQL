{# Reviews pane — inline kind-agnostic x-data.  Talks to the
   polymorphic /api/social/model/{ref}/reviews endpoints (added
   in 77.2.1 alongside the polymorphic UNIQUE migration). #}
<div class="tab-pane fade" id="tab-reviews" role="tabpanel"
     x-data='modelReviews({{ model.full_name|tojson }})'>
    <template x-if="!reviewsLoaded">
        <div class="text-muted small p-3">Loading reviews…</div>
    </template>
    <template x-if="reviewsLoaded">
        <div>
            <div class="d-flex align-items-center gap-3 mb-3">
                <template x-if="summary.count > 0">
                    <div>
                        <span class="h4 mb-0" x-text="(summary.avg_stars || 0).toFixed(1)"></span>
                        <span class="text-warning"><i class="bi bi-star-fill"></i></span>
                        <span class="text-muted small">
                            (<span x-text="summary.count"></span> review<span x-text="summary.count === 1 ? '' : 's'"></span>)
                        </span>
                    </div>
                </template>
                <template x-if="summary.count === 0">
                    <div class="text-muted small">No reviews yet — be the first.</div>
                </template>
            </div>
            <template x-for="r in reviews" :key="r.id">
                <div class="card mb-2 pql-review-card">
                    <div class="card-body py-2">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <div class="small">
                                <strong x-text="(r.author && (r.author.display_name || r.author.email)) || 'unknown'"></strong>
                                <span class="text-warning ms-2">
                                    <template x-for="n in r.stars" :key="n"><i class="bi bi-star-fill"></i></template><template x-for="n in (5 - r.stars)" :key="'e' + n"><i class="bi bi-star"></i></template>
                                </span>
                                <span class="text-muted ms-2"
                                      x-text="pqlRelativeTime(r.created_at)"
                                      :title="pqlAbsTime(r.created_at)"></span>
                            </div>
                            <template x-if="myReview && r.id === myReview.id">
                                <button class="btn btn-sm btn-link text-danger p-0"
                                        @click="deleteMine()" title="Remove my review">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </template>
                        </div>
                        <div class="pql-review-body" x-html="window.pqlRenderCitations(r.body_md_resolved || r.body_md)"></div>
                    </div>
                </div>
            </template>

            <form class="mt-3" @submit.prevent="submitMine()">
                <div class="mb-2">
                    <label class="form-label small">Your rating</label>
                    <div>
                        <template x-for="n in 5" :key="n">
                            <button type="button" class="btn btn-link p-0 me-1 text-warning"
                                    @click="draftStars = n">
                                <i class="bi" :class="n <= draftStars ? 'bi-star-fill' : 'bi-star'"></i>
                            </button>
                        </template>
                    </div>
                </div>
                <div class="mb-2">
                    <textarea class="form-control" rows="3"
                              placeholder="Optional comment — markdown welcome"
                              x-model="draftBody"></textarea>
                </div>
                <button class="btn btn-primary btn-sm" type="submit"
                        :disabled="postBusy || draftStars < 1">
                    <i class="bi bi-send me-1"></i>
                    <span x-text="myReview ? 'Update review' : 'Post review'"></span>
                </button>
            </form>
        </div>
    </template>
</div>
