 {# ===== Lineage summary ===== #}
 <div class="accordion-item">
  <h2 class="accordion-header">
   <button class="accordion-button collapsed"
           type="button"
           data-bs-toggle="collapse"
           data-bs-target="#pql-meta-section-lineage"
           aria-expanded="false"
           aria-controls="pql-meta-section-lineage">
    <i class="bi bi-diagram-2 me-2" aria-hidden="true"></i>
    Lineage
    <span class="badge bg-secondary"
          x-show="notebookLineageSummary().writeTables.length > 0"
          x-text="notebookLineageSummary().writeTables.length"
          x-cloak></span>
   </button>
  </h2>
  <div id="pql-meta-section-lineage" class="accordion-collapse collapse">
   <div class="accordion-body">
    <div class="text-muted small mb-1"
         x-show="cellLineageLoading" x-cloak>Loading…</div>
    <template x-if="cellLineageLoaded && notebookLineageSummary().writeTables.length === 0">
     <div class="text-muted small fst-italic">
      No recorded write operations in this notebook yet.
     </div>
    </template>
    <template x-if="notebookLineageSummary().writeTables.length > 0">
     <div>
      <div class="text-muted small mb-1">
       <i class="bi bi-pencil-square me-1" aria-hidden="true"></i>
       Write targets
       (<span x-text="notebookLineageSummary().totalOps"></span> ops)
      </div>
      <ul class="list-unstyled mb-0 small">
       <template x-for="row in notebookLineageSummary().writeTables" :key="row.table">
        <li class="d-flex align-items-center gap-1 py-1">
         <i class="bi bi-table text-muted" aria-hidden="true"></i>
         <code class="text-body font-monospace small flex-grow-1 text-truncate"
               :title="row.table"
               x-text="row.table"></code>
         <span class="badge bg-secondary"
               x-text="row.count"></span>
        </li>
       </template>
      </ul>
     </div>
    </template>
   </div>
  </div>
 </div>
