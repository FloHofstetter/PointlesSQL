 {# ===== Branch binding ===== #}
 <div class="accordion-item">
  <h2 class="accordion-header">
   <button class="accordion-button collapsed"
           type="button"
           data-bs-toggle="collapse"
           data-bs-target="#pql-meta-section-branch"
           aria-expanded="false"
           aria-controls="pql-meta-section-branch">
    <i class="bi bi-diagram-3 me-2" aria-hidden="true"></i>
    Branch binding
    <span class="badge"
          :class="branchBinding.current && branchBinding.current.promoted_at ? 'bg-success' : 'bg-warning text-dark'"
          x-show="branchBinding.loaded && branchBinding.current"
          x-cloak
          x-text="branchBinding.current && branchBinding.current.promoted_at ? 'promoted' : 'pending'"></span>
   </button>
  </h2>
  <div id="pql-meta-section-branch" class="accordion-collapse collapse">
   <div class="accordion-body" data-testid="meta-panel-branch-section">
    <div class="text-muted small mb-1"
         x-show="branchBinding.loading" x-cloak>Loading…</div>
    <div class="text-danger small mb-1"
         x-show="branchBinding.error" x-cloak
         x-text="branchBinding.error"></div>

    {# No binding → bind-form. #}
    <template x-if="branchBinding.loaded && !branchBinding.current">
     <form @submit.prevent="submitBranchBinding()">
      <div class="text-muted small mb-2">
       Bind this notebook to a Delta branch so writes target an
       isolated namespace.
      </div>
      <label class="form-label small text-muted">Branch name</label>
      <input type="text"
             class="form-control form-control-sm mb-2"
             placeholder="experiment_x"
             x-model="branchBinding.draftName"
             :disabled="branchBinding.submitting">
      <label class="form-label small text-muted">
       Base revision <span class="text-muted">(optional)</span>
      </label>
      <input type="text"
             class="form-control form-control-sm font-monospace mb-2"
             placeholder="revision uuid…"
             x-model="branchBinding.draftRevision"
             :disabled="branchBinding.submitting">
      <button type="submit" class="btn btn-sm btn-primary w-100"
              :disabled="branchBinding.submitting || !branchBinding.draftName.trim()">
       <span x-show="branchBinding.submitting" x-cloak>
        <span class="spinner-border spinner-border-sm me-1" role="status"></span>
       </span>
       Bind
      </button>
     </form>
    </template>

    {# Active binding → status + actions. #}
    <template x-if="branchBinding.loaded && branchBinding.current">
     <div>
      <div class="mb-2">
       <code class="text-body font-monospace small"
             x-text="branchBinding.current.branch_name"></code>
       <div class="text-muted small mt-1"
            x-show="branchBinding.current.base_revision_uuid"
            x-cloak>
        base
        <code class="text-body font-monospace small"
              x-text="(branchBinding.current.base_revision_uuid || '').slice(0, 8)"></code>
       </div>
       <div class="small text-muted">
        <span x-text="`bound ${branchBinding.current.created_at || ''}`"></span>
       </div>
       <template x-if="branchBinding.current.promoted_at">
        <div class="small text-muted">
         promoted <span x-text="branchBinding.current.promoted_at"></span>
        </div>
       </template>
      </div>
      <div class="d-flex gap-1">
       <button type="button" class="btn btn-sm btn-outline-success"
               x-show="!branchBinding.current.promoted_at"
               @click="promoteBranchBinding()"
               :disabled="branchBinding.submitting"
               x-cloak>
        <i class="bi bi-check2-circle" aria-hidden="true"></i>
        Promote
       </button>
       <button type="button" class="btn btn-sm btn-outline-danger"
               @click="discardBranchBinding()"
               :disabled="branchBinding.submitting">
        <i class="bi bi-x-octagon" aria-hidden="true"></i>
        <span x-text="branchBinding.current.promoted_at ? 'Unbind' : 'Discard'"></span>
       </button>
      </div>
     </div>
    </template>

    <div class="mt-2 pt-2 border-top">
     <button type="button" class="btn btn-sm btn-link p-0"
             @click="loadBranchHistory()"
             x-show="!branchBinding.historyLoaded"
             x-cloak>
      <i class="bi bi-clock-history me-1" aria-hidden="true"></i>
      Show history
     </button>
     <template x-if="branchBinding.historyLoaded">
      <div>
       <div class="text-muted small mb-1">Recent bindings</div>
       <template x-if="branchBinding.history.length === 0">
        <span class="text-muted small fst-italic">No bindings yet.</span>
       </template>
       <ul class="list-unstyled mb-0 small">
        <template x-for="row in branchBinding.history" :key="row.id || row.binding_id || row.created_at">
         <li class="d-flex align-items-center gap-1">
          <span class="badge"
                :class="{
                  'bg-success': row.promoted_at,
                  'bg-warning text-dark': !row.promoted_at && !row.discarded_at,
                  'bg-secondary': row.discarded_at
                }"
                x-text="row.promoted_at ? 'promoted' : (row.discarded_at ? 'discarded' : 'pending')"></span>
          <code class="text-body font-monospace small"
                x-text="row.branch_name"></code>
         </li>
        </template>
       </ul>
      </div>
     </template>
    </div>
   </div>
  </div>
 </div>
