 {# Phase 67.2 Schedule modal — Bootstrap modal toggled via :class
    instead of x-show per `feedback_bootstrap_modal_x_show.md`. #}
 <div class="modal fade pql-notebook-modal"
      :class="{ 'd-block': scheduleModalOpen }"
      x-show="scheduleModalOpen"
      x-cloak
      tabindex="-1"
      role="dialog"
      aria-labelledby="scheduleNotebookModalLabel"
      @keydown.escape.window="closeScheduleModal()">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
   <div class="modal-content">
    <div class="modal-header">
     <h5 class="modal-title" id="scheduleNotebookModalLabel">
      <i class="bi bi-clock me-1"></i>
      Schedule notebook
     </h5>
     <button type="button" class="btn-close" @click="closeScheduleModal()"
             aria-label="Close"></button>
    </div>
    <div class="modal-body">
     <div class="alert alert-danger small"
          x-show="scheduleError"
          x-cloak
          x-text="scheduleError"></div>
     <div class="mb-3">
      <label class="form-label" for="schedule-name-input">Job name</label>
      <input id="schedule-name-input" type="text" class="form-control"
             x-model="scheduleForm.name"
             placeholder="notebook:demo:flo">
     </div>
     <div class="mb-3">
      <label class="form-label" for="schedule-cron-input">Cron expression</label>
      <input id="schedule-cron-input" type="text"
             class="form-control font-monospace"
             x-model="scheduleForm.cronExpr"
             placeholder="0 5 * * *">
      <small class="form-text text-muted"
             x-text="describeCron(scheduleForm.cronExpr)"></small>
     </div>
     <div class="mb-2" x-show="parameters && parameters.length > 0" x-cloak>
      <label class="form-label">Parameter overrides</label>
      <template x-for="p in parameters" :key="p.name">
       <div class="row align-items-center mb-2">
        <div class="col-sm-4">
         <code x-text="p.name"></code>
         <small class="text-muted ms-1"
                x-text="p.inferred_type || 'str'"></small>
        </div>
        <div class="col-sm-8">
         <input type="text" class="form-control form-control-sm"
                :placeholder="`default: ${p.default}`"
                x-model="scheduleForm.parameters[p.name]">
        </div>
       </div>
      </template>
     </div>
     <div class="form-text"
          x-show="!parameters || parameters.length === 0">
      This notebook declares no <code>parameters</code>-tagged cell.
      Add one with <code>tags=["parameters"]</code> to expose
      overridable inputs.
     </div>
    </div>
    <div class="modal-footer">
     <button type="button" class="btn btn-secondary"
             @click="closeScheduleModal()">Cancel</button>
     <button type="button" class="btn btn-primary"
             :disabled="scheduleSubmitting"
             @click="submitSchedule()">
      <span x-show="scheduleSubmitting"
            class="spinner-border spinner-border-sm me-1"
            x-cloak></span>
      Schedule
     </button>
    </div>
   </div>
  </div>
 </div>
 <div class="modal-backdrop fade show"
      x-show="scheduleModalOpen"
      x-cloak
      @click="closeScheduleModal()"></div>
