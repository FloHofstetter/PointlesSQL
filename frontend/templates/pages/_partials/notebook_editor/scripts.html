{% if notebook_uuid %}
<script>
function notebookDiscussion(notebookUuid) {
  return {
    notebookUuid: notebookUuid,
    comments: [],
    commentsLoaded: false,
    draftBody: '',
    async init() {
      const res = await window.pqlApi.fetch('/api/social/notebook/' + notebookUuid + '/comments');
      this.comments = (res && res.ok && res.data && res.data.comments) || [];
      this.commentsLoaded = true;
    },
    async submitNew() {
      if (!this.draftBody.trim()) return;
      const res = await window.pqlApi.fetch('/api/social/notebook/' + notebookUuid + '/comments', {
        method: 'POST',
        body: JSON.stringify({body_md: this.draftBody}),
      });
      if (res && res.ok) { this.draftBody = ''; await this.init(); }
    },
  };
}
window.notebookDiscussion = notebookDiscussion;

function notebookReadme(notebookUuid) {
  return {
    notebookUuid: notebookUuid,
    bodyRendered: '',
    draftBody: '',
    editing: false,
    readmeLoaded: false,
    async init() {
      const res = await window.pqlApi.fetch('/api/social/notebook/' + notebookUuid + '/readme');
      this.bodyRendered = (res && res.ok && res.data && (res.data.body_md_resolved || res.data.body_md)) || '';
      this.draftBody = (res && res.ok && res.data && res.data.body_md) || '';
      this.readmeLoaded = true;
    },
    async save() {
      const res = await window.pqlApi.fetch('/api/social/notebook/' + this.notebookUuid + '/readme', {
        method: 'PUT',
        body: JSON.stringify({body_md: this.draftBody}),
      });
      if (res && res.ok) { this.editing = false; await this.init(); }
    },
  };
}
window.notebookReadme = notebookReadme;
</script>
{% endif %}
