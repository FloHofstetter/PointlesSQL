 {% if notebook_uuid %}
 {# Phase 77.6 — Social drawer body. #}
 <div class="offcanvas offcanvas-end pql-notebook-social-drawer"
      tabindex="-1" id="pql-notebook-social-drawer"
      aria-labelledby="pql-notebook-social-drawer-title"
      x-data='socialTabs({
          kind: "notebook",
          ref: {{ notebook_uuid|tojson }},
          endorsementTypes: [
              {key: "verified-by-steward", label: "Verified by steward",
               description: "Steward rubber-stamped the notebook."},
              {key: "production-ready", label: "Production ready",
               description: "Promoted for downstream consumption."},
              {key: "deprecated", label: "Deprecated",
               description: "Soft warning on writes — plan a sunset."},
              {key: "under-review", label: "Under review",
               description: "Actively being audited; expect churn."}
          ]
      })'>
  <div class="offcanvas-header">
   <h5 class="offcanvas-title" id="pql-notebook-social-drawer-title">
    <i class="bi bi-people me-1"></i>Notebook social
   </h5>
   <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
           aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
   <ul class="nav nav-tabs mb-3" role="tablist">
    <li class="nav-item" role="presentation">
     <button class="nav-link active" data-bs-toggle="tab"
             data-bs-target="#tab-discussion" type="button"
             role="tab">Discussion</button>
    </li>
    <li class="nav-item" role="presentation">
     <button class="nav-link" data-bs-toggle="tab"
             data-bs-target="#tab-endorsements" type="button"
             role="tab">Endorsements</button>
    </li>
    <li class="nav-item" role="presentation">
     <button class="nav-link" data-bs-toggle="tab"
             data-bs-target="#tab-followers" type="button"
             role="tab">Followers</button>
    </li>
    <li class="nav-item" role="presentation">
     <button class="nav-link" data-bs-toggle="tab"
             data-bs-target="#tab-readme" type="button"
             role="tab">README</button>
    </li>
   </ul>
   <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-discussion" role="tabpanel"
         x-data='notebookDiscussion({{ notebook_uuid|tojson }})'
         x-init="init()">
     <template x-if="!commentsLoaded">
      <div class="text-muted small p-3">Loading discussion…</div>
     </template>
     <template x-if="commentsLoaded">
      <div>
       <template x-for="c in comments" :key="c.id">
        <div class="card mb-2">
         <div class="card-body py-2">
          <div class="small text-muted mb-1">
           <strong x-text="(c.author && (c.author.display_name || c.author.email)) || 'unknown'"></strong>
           · <span x-text="pqlRelativeTime(c.created_at)" :title="pqlAbsTime(c.created_at)"></span>
          </div>
          <div class="pql-comment-body" x-html="c.body_md_resolved || c.body_md"></div>
         </div>
        </div>
       </template>
       <form class="mt-3" @submit.prevent="submitNew()">
        <textarea class="form-control mb-2" rows="3"
                  x-model="draftBody"
                  placeholder="Add a comment…"></textarea>
        <button class="btn btn-primary btn-sm" type="submit"
                :disabled="!draftBody.trim()">Post</button>
       </form>
      </div>
     </template>
    </div>
    {% include 'partials/social/_endorsements_pane.html' %}
    {% include 'partials/social/_followers_pane.html' %}
    <div class="tab-pane fade" id="tab-readme" role="tabpanel"
         x-data='notebookReadme({{ notebook_uuid|tojson }})'
         x-init="init()">
     <template x-if="!readmeLoaded">
      <div class="text-muted small p-3">Loading README…</div>
     </template>
     <template x-if="readmeLoaded && !editing">
      <div>
       <button class="btn btn-sm btn-outline-secondary mb-2"
               @click="editing = true">Edit README</button>
       <div class="card"><div class="card-body" x-html="bodyRendered || '<em class=text-muted>No README yet.</em>'"></div></div>
      </div>
     </template>
     <template x-if="editing">
      <div>
       <textarea class="form-control mb-2" rows="10" x-model="draftBody"></textarea>
       <button class="btn btn-sm btn-primary" @click="save()">Save</button>
       <button class="btn btn-sm btn-outline-secondary" @click="editing = false">Cancel</button>
      </div>
     </template>
    </div>
   </div>
  </div>
 </div>
 {% endif %}
