 <div class="modal fade pql-notebook-modal"
      :class="{ 'd-block': runOnceModalOpen }"
      x-show="runOnceModalOpen"
      x-cloak
      tabindex="-1"
      role="dialog"
      aria-labelledby="runOnceNotebookModalLabel"
      @keydown.escape.window="closeRunOnceModal()">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
   <div class="modal-content">
    <div class="modal-header">
     <h5 class="modal-title" id="runOnceNotebookModalLabel">
      <i class="bi bi-lightning me-1"></i>
      Run notebook as one-shot job
     </h5>
     <button type="button" class="btn-close" @click="closeRunOnceModal()"
             aria-label="Close"></button>
    </div>
    <div class="modal-body">
     <div class="alert alert-danger small"
          x-show="runOnceError"
          x-cloak
          x-text="runOnceError"></div>
     <div class="mb-2" x-show="parameters && parameters.length > 0" x-cloak>
      <label class="form-label">Parameter overrides</label>
      <template x-for="p in parameters" :key="p.name">
       <div class="row align-items-center mb-2">
        <div class="col-sm-4">
         <code x-text="p.name"></code>
         <small class="text-muted ms-1"
                x-text="p.inferred_type || 'str'"></small>
        </div>
        <div class="col-sm-8">
         <input type="text" class="form-control form-control-sm"
                :placeholder="`default: ${p.default}`"
                x-model="runOnceForm.parameters[p.name]">
        </div>
       </div>
      </template>
     </div>
     <div class="form-text"
          x-show="!parameters || parameters.length === 0">
      This notebook declares no parameters. The run uses the notebook
      defaults as written on disk.
     </div>
     <div class="alert alert-info small mt-3"
          x-show="runOnceStatus"
          x-cloak
          x-text="runOnceStatus"></div>
    </div>
    <div class="modal-footer">
     <button type="button" class="btn btn-secondary"
             @click="closeRunOnceModal()">Close</button>
     <button type="button" class="btn btn-primary"
             :disabled="runOnceSubmitting"
             @click="submitRunOnce()">
      <span x-show="runOnceSubmitting"
            class="spinner-border spinner-border-sm me-1"
            x-cloak></span>
      Run
     </button>
    </div>
   </div>
  </div>
 </div>
 <div class="modal-backdrop fade show"
      x-show="runOnceModalOpen"
      x-cloak
      @click="closeRunOnceModal()"></div>
