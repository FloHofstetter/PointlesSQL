 {# Phase 67.5 Variable Inspector floating pane. #}
 <div class="pql-notebook-inspector"
      x-show="inspectorOpen"
      x-cloak>
  <div class="d-flex justify-content-between align-items-center mb-2">
   <strong>
    <i class="bi bi-eye me-1"></i>
    Variables
   </strong>
   <div class="d-flex align-items-center gap-1">
    <button type="button" class="btn btn-sm btn-link p-0"
            @click="requestVariableSnapshot()"
            title="Refresh">
     <i class="bi bi-arrow-clockwise"></i>
    </button>
    <button type="button" class="btn-close btn-close-sm"
            @click="inspectorOpen = false"
            aria-label="Close"></button>
   </div>
  </div>
  <template x-if="inspectorVars.length === 0">
   <div class="text-muted small">
    Run a cell — kernel namespace will appear here.
   </div>
  </template>
  <template x-for="v in inspectorVars" :key="v.name">
   <div class="pql-notebook-inspector__row"
        @click="requestVariableDetail(v.name)">
    <span class="pql-notebook-inspector__name" x-text="v.name"></span>
    <span class="pql-notebook-inspector__type"
          x-text="v.shape ? `${v.type}${v.shape ? '['+v.shape.join('x')+']' : ''}` : (v.len !== undefined ? `${v.type}[${v.len}]` : v.type)"></span>
    <span class="pql-notebook-inspector__repr" x-text="v.repr"></span>
   </div>
  </template>
  <div class="pql-notebook-inspector__detail mt-2"
       x-show="inspectorDetail"
       x-cloak>
   <hr class="my-2">
   <div class="small text-muted mb-1"
        x-text="inspectorDetailFor"></div>
   <template x-if="inspectorDetail && inspectorDetail.html">
    <div x-html="inspectorDetail.html"></div>
   </template>
   <template x-if="inspectorDetail && !inspectorDetail.html">
    <pre class="mb-0" x-text="inspectorDetail.repr"></pre>
   </template>
  </div>
 </div>
