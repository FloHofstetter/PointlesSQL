 <div class="d-flex align-items-center justify-content-between mb-3">
 <div class="d-flex align-items-center gap-2">
 <i class="bi bi-code-square fs-3"></i>
 <h1 class="h3 mb-0">SQL{{ info('sql.run-modes') }}</h1>
 </div>
 <div class="d-flex align-items-center gap-2">
 <div class="text-muted small" x-show="lastRun" x-cloak>
 <span x-text="lastRun ? lastRun.summary : ''"></span>
 </div>
 {% if chat_enabled %}
 <button type="button"
 class="btn btn-outline-primary btn-sm"
 @click="chatOpen = !chatOpen"
 :class="{ 'active': chatOpen }"
 data-testid="sql-chat-toggle"
 aria-label="Toggle NL→SQL chat panel">
 <i class="bi bi-chat-dots"></i>
 <span class="d-none d-md-inline ms-1">Chat</span>
 </button>
 {% endif %}
 </div>
 </div>

 <div class="row g-3">
 <div class="col-12">
 <div class="card mb-3">
 <div class="card-body">
 <div id="pql-sql-editor-root" class="pql-sql-editor-host mb-3"></div>
 <div class="d-flex gap-2 flex-wrap">
 <button type="button"
 class="btn btn-primary btn-sm"
 @click="run()"
 :disabled="running">
 <span x-show="!running">
 <i class="bi bi-play-fill"></i> Run
 </span>
 <span x-show="running" x-cloak>
 <span class="spinner-border spinner-border-sm me-1" role="status"></span>
 Running… <span x-text="elapsedSeconds"></span>s
 </span>
 </button>
 <button type="button"
 class="btn btn-outline-danger btn-sm"
 x-show="running"
 x-cloak
 @click="cancel()">
 <i class="bi bi-x-octagon"></i> Cancel
 </button>
 <button type="button"
 class="btn btn-outline-info btn-sm"
 @click="run({ explain: true })"
 :disabled="running"
 title="EXPLAIN ANALYZE">
 <i class="bi bi-diagram-3"></i> Explain{{ info('sql.cost-gate') }}
 </button>
 <button type="button"
 class="btn btn-outline-info btn-sm"
 @click="run({ profile: true })"
 :disabled="running"
 title="Run and capture the per-operator runtime profile">
 <i class="bi bi-speedometer2"></i> Profile
 </button>
 <button type="button"
 class="btn btn-outline-secondary btn-sm"
 @click="openSaveModal()">
 <i class="bi bi-bookmark-plus"></i> Save{{ info('sql.saved-queries') }}
 </button>
 <button type="button"
 class="btn btn-outline-secondary btn-sm"
 @click="toggleBuilder()"
 :class="{ 'active': builderOpen }"
 title="Visual query builder">
 <i class="bi bi-sliders"></i>
 <span x-text="builderOpen ? 'Hide builder' : 'Builder'"></span>
 </button>
 <span class="text-muted small align-self-center ms-2">
 <kbd>Cmd</kbd>+<kbd>Enter</kbd> run · <kbd>Cmd</kbd>+<kbd>S</kbd> save
 </span>
 <span class="ms-auto text-muted small align-self-center" x-show="referencedTables.length" x-cloak>
 Tables: <template x-for="t in referencedTables" :key="t"><code class="me-1" x-text="t"></code></template>
 </span>
 </div>
 </div>
 </div>
 </div>
