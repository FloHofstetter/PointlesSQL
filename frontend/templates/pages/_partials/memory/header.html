{# Memory page header: agent identity + activity stats. #}
<div class="d-flex justify-content-between align-items-start mb-3">
    <div class="flex-grow-1 min-w-0">
        <h1 class="h3 mb-1">
            <i class="bi bi-cpu me-2"></i>
            <span class="font-monospace">{{ agent.id }}</span>
        </h1>
        <p class="text-muted mb-0 small">
            <span data-testid="run-count-badge">
                <i class="bi bi-clock-history me-1"></i>
                {{ agent.run_count }} run{% if agent.run_count != 1 %}s{% endif %}
            </span>
            {% if agent.last_seen %}
                · <span data-testid="last-seen"
                        title="{{ agent.last_seen }}">last seen
                    <span class="font-monospace">{{ agent.last_seen[:19] }}</span></span>
            {% else %}
                · <span class="text-muted">no activity recorded</span>
            {% endif %}
        </p>
    </div>
</div>
