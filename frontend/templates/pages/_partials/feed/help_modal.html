<div class="modal fade" id="pql-feed-help-modal" tabindex="-1" aria-labelledby="pql-feed-help-modal-title" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="pql-feed-help-modal-title">Feed keyboard shortcuts</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <dl class="row mb-0 small">
                    <dt class="col-3"><kbd>j</kbd></dt><dd class="col-9">Next item</dd>
                    <dt class="col-3"><kbd>k</kbd></dt><dd class="col-9">Previous item</dd>
                    <dt class="col-3"><kbd>o</kbd> / <kbd>Enter</kbd></dt><dd class="col-9">Open focused item</dd>
                    <dt class="col-3"><kbd>e</kbd></dt><dd class="col-9">Toggle read (notifications)</dd>
                    <dt class="col-3"><kbd>m</kbd></dt><dd class="col-9">Mute focused thread</dd>
                    <dt class="col-3"><kbd>r</kbd></dt><dd class="col-9">Focus search input</dd>
                    <dt class="col-3"><kbd>?</kbd></dt><dd class="col-9">Open this help</dd>
                </dl>
            </div>
        </div>
    </div>
</div>
