 {# Row trace sub-pane.
 Hits the existing GET /api/lineage/row-trace endpoint;
 deep-linked via the pql:trace-row window event fired
 from Summary "Trace target row" buttons.  Cold-start
 fallback: two text inputs + Trace button. #}
 <div class="tab-pane fade" id="tab-lineage-row-trace" role="tabpanel" aria-labelledby="tab-lineage-row-trace-btn">
 <div x-data="rowTracePane()" x-init="init()">
 <form class="row g-2 align-items-end mb-3" @submit.prevent="fetch()">
 <div class="col-md-5">
 <label class="form-label small" for="row-trace-table">Table (3-part FQN)</label>
 <input id="row-trace-table" type="text" class="form-control form-control-sm font-monospace"
 placeholder="catalog.schema.table" x-model="table">
 </div>
 <div class="col-md-5">
 <label class="form-label small" for="row-trace-row-id"><code>_lineage_row_id</code></label>
 <input id="row-trace-row-id" type="text" class="form-control form-control-sm font-monospace"
 placeholder="row id to trace" x-model="rowId">
 </div>
 <div class="col-md-2">
 <button type="submit" class="btn btn-sm btn-primary w-100"
 :disabled="loading || !table || !rowId">
 <span x-show="!loading"><i class="bi bi-search me-1"></i>Trace</span>
 <span x-show="loading"><span class="spinner-border spinner-border-sm me-1"></span>Loading…</span>
 </button>
 </div>
 </form>
 <template x-if="error">
 <div class="alert alert-danger small" x-text="error"></div>
 </template>
 <template x-if="!loaded && !error && !loading">
 <div class="alert alert-info small mb-0">
 <i class="bi bi-info-circle me-1"></i>
 Pick a row from <strong>Summary</strong> (the
 <i class="bi bi-record-circle"></i> button on each op row) or
 the <strong>Graph</strong> side-panel, or paste a
 <code>(table, _lineage_row_id)</code> pair above and
 click <em>Trace</em>.  The standalone
 <code>/catalogs/.../rows/{row_id}/trace</code> page
 stays bookmarkable for direct links.
 </div>
 </template>
 <template x-if="loaded && !error && steps.length === 0">
 <div class="alert alert-warning small mb-0">
 <i class="bi bi-exclamation-triangle me-1"></i>
 No <code>lineage_row_edges</code> rows reference this
 <code>_lineage_row_id</code>.
 </div>
 </template>
 <template x-if="loaded && !error && steps.length > 0">
 <ol class="list-group list-group-flush list-group-numbered border rounded">
 <template x-for="step in steps" :key="step.depth + '__' + step.row_id">
 <li class="list-group-item">
 <div class="d-flex flex-column gap-1 small">
 <div class="d-flex align-items-center gap-2">
 <span class="badge bg-secondary" x-text="'depth ' + step.depth"></span>
 <span class="font-monospace text-break" x-text="step.table"></span>
 <span x-show="step.op_name" class="badge bg-info text-dark"
 :title="'op_id=' + step.op_id"
 x-text="step.op_name"></span>
 <span x-show="step.predecessors && step.predecessors.length > 1"
 class="badge bg-warning text-dark"
 :title="'fan-in — multiple source rows fed this output'"
 x-text="'fan-in × ' + step.predecessors.length"></span>
 </div>
 <div class="text-muted font-monospace text-break">
 <code>_lineage_row_id</code> = <span x-text="step.row_id"></span>
 </div>
 <div x-show="step.source_file" class="small">
 <i class="bi bi-file-earmark-text me-1"></i>
 Source file: <span class="font-monospace" x-text="step.source_file"></span>
 </div>
 <details x-show="step.predecessors && step.predecessors.length > 0">
 <summary class="text-muted">
 <span x-text="'Predecessors (' + step.predecessors.length + ')'"></span>
 </summary>
 <ul class="list-unstyled ms-3 mb-0 mt-1">
 <template x-for="pred in step.predecessors" :key="pred.table + '__' + pred.row_id">
 <li class="font-monospace text-break">
 <i class="bi bi-arrow-90deg-left me-1"></i>
 <span x-text="pred.table + ' / ' + (pred.row_id || '').slice(0, 16) + '…'"></span>
 <span x-show="pred.op_name && pred.op_id !== step.op_id"
 class="badge bg-light text-dark border ms-1"
 x-text="pred.op_name"></span>
 </li>
 </template>
 </ul>
 </details>
 <details x-show="step.value_changes && step.value_changes.length > 0">
 <summary class="text-muted">
 <i class="bi bi-pencil-square me-1"></i>
 <span x-text="'Value changes (' + step.value_changes.length + ')'"></span>
 </summary>
 <ul class="list-unstyled ms-3 mb-0 mt-1">
 <template x-for="change in step.value_changes" :key="change.run_id + '__' + change.op_id + '__' + change.target_column">
 <li class="font-monospace text-break">
 <span class="badge bg-light text-dark border" x-text="change.target_column"></span>
 <span class="text-muted">·</span>
 <span x-text="change.display_old !== undefined ? change.display_old : (change.old_value === null ? 'NULL' : change.old_value)"></span>
 <i class="bi bi-arrow-right mx-1"></i>
 <span x-text="change.display_new !== undefined ? change.display_new : (change.new_value === null ? 'NULL' : change.new_value)"></span>
 </li>
 </template>
 </ul>
 </details>
 </div>
 </li>
 </template>
 </ol>
 </template>
 </div>
 </div>
