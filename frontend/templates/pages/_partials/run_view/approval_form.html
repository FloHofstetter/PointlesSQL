{% if run.status == 'needs_approval' and current_user and current_user.is_admin %}
<div class="card mb-4 border-warning"
 x-data="{
 denyReason: '',
 busy: false,
 error: null,
 async approve() {
 this.busy = true; this.error = null;
 try {
 const r = await fetch('/api/agent-runs/{{ run.id }}/approve', {method: 'POST'});
 if (!r.ok) throw new Error('HTTP ' + r.status);
 window.location.reload();
 } catch (e) { this.error = String(e); this.busy = false; }
 },
 async deny() {
 this.busy = true; this.error = null;
 try {
 const r = await fetch('/api/agent-runs/{{ run.id }}/deny', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({reason: this.denyReason})
 });
 if (!r.ok) throw new Error('HTTP ' + r.status);
 window.location.reload();
 } catch (e) { this.error = String(e); this.busy = false; }
 }
 }">
 <div class="card-header bg-warning-subtle">
 <i class="bi bi-shield-exclamation me-1"></i>This run is awaiting admin approval
 </div>
 <div class="card-body small">
 <div class="mb-3">
 <label class="form-label small text-muted">Optional denial reason</label>
 <textarea class="form-control form-control-sm" rows="2" x-model="denyReason"
 placeholder="Why are you rejecting this run?"></textarea>
 </div>
 <div class="d-flex gap-2">
 <button type="button" class="btn btn-success btn-sm" :disabled="busy" @click="approve">
 <i class="bi bi-check-circle me-1"></i>Approve
 </button>
 <button type="button" class="btn btn-outline-danger btn-sm" :disabled="busy" @click="deny">
 <i class="bi bi-x-circle me-1"></i>Deny
 </button>
 <span x-show="busy" class="text-muted small align-self-center">working…</span>
 <span x-show="error" x-text="error" class="text-danger small align-self-center"></span>
 </div>
 </div>
</div>
{% endif %}
