<div class="d-flex align-items-center justify-content-between mb-4">
 <div class="d-flex align-items-center gap-2">
 <i class="bi bi-file-earmark-code fs-3"></i>
 <h1 class="h4 mb-0 font-monospace">{{ notebook_path }}</h1>
 {% if run %}
 <span class="badge {{ status_class(run.status) }}">{{ run.status }}</span>
 {% endif %}
 </div>
 {% if run and run.tables_touched %}
 <div>
 {% set first_touched = run.tables_touched[0] %}
 <a href="/catalogs/{{ first_touched.split('.')[0] }}/schemas/{{ first_touched.split('.')[1] }}/tables/{{ first_touched.split('.')[2] }}#lineage"
 class="btn btn-sm btn-outline-secondary"
 title="Open the lineage card for {{ first_touched }} (OpenLineage emission)">
 <i class="bi bi-diagram-3 me-1"></i>View lineage graph
 </a>
 </div>
 {% endif %}
</div>
