<div x-data="commandPalette()"
     x-init="init()"
     @pql:open-palette.window="openPalette()"
     @keydown.window="onGlobalKeydown($event)">

    <!-- Command palette dialog -->
    <div x-show="open"
         x-cloak
         class="pql-cmdk-backdrop"
         @click="closePalette()"
         x-transition.opacity></div>
    <div x-show="open"
         x-cloak
         class="pql-cmdk-dialog"
         role="dialog"
         aria-modal="true"
         aria-label="Search PointlesSQL"
         @keydown="onDialogKeydown($event)"
         @click.stop
         x-transition>
        <div class="pql-cmdk-input">
            <i class="bi bi-search"></i>
            <input type="text"
                   x-ref="search"
                   x-model="query"
                   @input="onQueryInput()"
                   placeholder="Search catalogs, tables, jobs, dashboards…"
                   spellcheck="false"
                   autocomplete="off">
            <span x-show="loading" class="pql-cmdk-spinner" aria-hidden="true">
                <span class="spinner-border spinner-border-sm"></span>
            </span>
        </div>
        <ul class="pql-cmdk-list" role="listbox">
            <template x-if="!query && recent.length === 0">
                <li class="pql-cmdk-empty">Start typing to search.</li>
            </template>
            <template x-if="query && !loading && results.length === 0">
                <li class="pql-cmdk-empty">No matches.</li>
            </template>
            <template x-if="!query && recent.length > 0">
                <li class="pql-cmdk-section">Recent</li>
            </template>
            <template x-for="(hit, idx) in (query ? results : recent)"
                      :key="hit.url + ':' + idx">
                <li class="pql-cmdk-item"
                    :class="{ 'is-selected': idx === selected }"
                    role="option"
                    :aria-selected="idx === selected"
                    @click="select(idx)"
                    @mouseenter="selected = idx">
                    <span class="pql-cmdk-type"
                          :class="'pql-cmdk-type--' + hit.type"
                          x-text="hit.type.replace('_', ' ')"></span>
                    <span class="pql-cmdk-label" x-text="hit.label"></span>
                    <span class="pql-cmdk-desc"
                          x-show="hit.description"
                          x-text="hit.description"></span>
                </li>
            </template>
        </ul>
        <footer class="pql-cmdk-hints">
            <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
            <span><kbd>↵</kbd> open</span>
            <span><kbd>esc</kbd> close</span>
        </footer>
    </div>

    <!-- Keyboard-shortcuts help modal -->
    <div x-show="helpOpen"
         x-cloak
         class="pql-cmdk-backdrop"
         @click="helpOpen = false"
         x-transition.opacity></div>
    <div x-show="helpOpen"
         x-cloak
         class="pql-cmdk-dialog pql-cmdk-help"
         role="dialog"
         aria-modal="true"
         aria-label="Keyboard shortcuts"
         @keydown.escape.stop.prevent="helpOpen = false"
         @click.stop
         x-transition>
        <h5 class="m-0">Keyboard shortcuts</h5>
        <dl class="pql-cmdk-shortcuts">
            <template x-for="s in shortcuts" :key="s.label">
                <div class="pql-cmdk-shortcut-row">
                    <dt>
                        <template x-for="(k, i) in s.keys" :key="i">
                            <span>
                                <span x-show="i > 0" class="pql-cmdk-shortcut-sep" x-text="s.combiner"></span><kbd x-text="k"></kbd>
                            </span>
                        </template>
                    </dt>
                    <dd x-text="s.label"></dd>
                </div>
            </template>
        </dl>
    </div>
</div>

<script>
(function () {
    const RECENT_KEY = 'pql.recentSearches';
    const RECENT_MAX = 10;
    const DEBOUNCE_MS = 150;

    function isMac() {
        return /Mac|iPhone|iPad/.test(navigator.platform);
    }

    function isEditableTarget(el) {
        if (!el) return false;
        const tag = el.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
        if (el.isContentEditable) return true;
        return false;
    }

    function loadRecent() {
        try {
            const raw = localStorage.getItem(RECENT_KEY);
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed.slice(0, RECENT_MAX) : [];
        } catch (e) {
            return [];
        }
    }

    function saveRecent(list) {
        try {
            localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, RECENT_MAX)));
        } catch (e) {
            /* quota / disabled storage — ignore */
        }
    }

    const CHORD_TIMEOUT_MS = 1000;
    const CHORD_ROUTES = { h: '/', j: '/jobs', d: '/dashboards' };

    window.commandPalette = function () {
        const mod = isMac() ? '⌘' : 'Ctrl';
        return {
            open: false,
            helpOpen: false,
            query: '',
            results: [],
            selected: 0,
            recent: [],
            loading: false,
            modKey: mod,
            shortcuts: [
                { keys: [mod, 'K'], combiner: '+', label: 'Open command palette' },
                { keys: ['?'],       combiner: '',  label: 'Show this help' },
                { keys: ['esc'],     combiner: '',  label: 'Close any modal' },
                { keys: ['↑', '↓'],  combiner: ' ', label: 'Move selection in palette' },
                { keys: ['↵'],       combiner: '',  label: 'Open the selected hit' },
                { keys: ['g', 'h'],  combiner: ' ', label: 'Go to home' },
                { keys: ['g', 'j'],  combiner: ' ', label: 'Go to jobs' },
                { keys: ['g', 'd'],  combiner: ' ', label: 'Go to dashboards' },
                { keys: ['r'],       combiner: '',  label: 'Refresh current list' },
            ],
            _debounceTimer: null,
            _seq: 0,
            _chordTimer: null,
            _chordPending: false,

            init() {
                this.recent = loadRecent();
            },

            openPalette() {
                if (this.open) return;
                this.helpOpen = false;
                this.open = true;
                this.query = '';
                this.results = [];
                this.selected = 0;
                this.$nextTick(() => {
                    if (this.$refs.search) this.$refs.search.focus();
                });
            },

            closePalette() {
                this.open = false;
                this.query = '';
                this.results = [];
                this.loading = false;
                if (this._debounceTimer) {
                    clearTimeout(this._debounceTimer);
                    this._debounceTimer = null;
                }
            },

            toggleHelp() {
                this.helpOpen = !this.helpOpen;
            },

            onGlobalKeydown(e) {
                // Cmd+K / Ctrl+K — toggles palette from anywhere, including inputs
                const isK = e.key === 'k' || e.key === 'K';
                if (isK && (e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey) {
                    e.preventDefault();
                    this._cancelChord();
                    if (this.open) this.closePalette();
                    else this.openPalette();
                    return;
                }
                // Escape — close help even when palette is closed
                if (e.key === 'Escape' && this.helpOpen) {
                    e.preventDefault();
                    this._cancelChord();
                    this.helpOpen = false;
                    return;
                }
                // The remaining unmodified single-key bindings never fire
                // while a modal is open or the user is typing.
                if (this.open || this.helpOpen) return;
                if (isEditableTarget(e.target)) return;
                if (e.metaKey || e.ctrlKey || e.altKey) return;

                // ? opens help
                if (e.key === '?') {
                    e.preventDefault();
                    this._cancelChord();
                    this.toggleHelp();
                    return;
                }

                // r — refresh the current list page (opt-in via <body data-pql-refresh>)
                if (e.key === 'r' && document.body.dataset.pqlRefresh === '1') {
                    e.preventDefault();
                    this._cancelChord();
                    window.pqlApi.reloadWithToast('Refreshing.', { delay: 0 });
                    return;
                }

                // Vim-style chord: `g` then {h,j,d} within 1s
                if (this._chordPending) {
                    const target = CHORD_ROUTES[e.key];
                    this._cancelChord();
                    if (target) {
                        e.preventDefault();
                        window.location.href = target;
                    }
                    return;
                }
                if (e.key === 'g') {
                    e.preventDefault();
                    this._chordPending = true;
                    this._chordTimer = setTimeout(() => this._cancelChord(), CHORD_TIMEOUT_MS);
                }
            },

            _cancelChord() {
                this._chordPending = false;
                if (this._chordTimer) {
                    clearTimeout(this._chordTimer);
                    this._chordTimer = null;
                }
            },

            onDialogKeydown(e) {
                const list = this.query ? this.results : this.recent;
                if (e.key === 'Escape') {
                    e.preventDefault();
                    this.closePalette();
                    return;
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (list.length === 0) return;
                    this.selected = (this.selected + 1) % list.length;
                    return;
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (list.length === 0) return;
                    this.selected = (this.selected - 1 + list.length) % list.length;
                    return;
                }
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (list.length === 0) return;
                    this.select(this.selected);
                }
            },

            onQueryInput() {
                this.selected = 0;
                if (this._debounceTimer) clearTimeout(this._debounceTimer);
                if (!this.query.trim()) {
                    this.results = [];
                    this.loading = false;
                    return;
                }
                this._debounceTimer = setTimeout(() => this.fetchResults(), DEBOUNCE_MS);
            },

            async fetchResults() {
                const q = this.query.trim();
                if (!q) {
                    this.results = [];
                    return;
                }
                this.loading = true;
                const seq = ++this._seq;
                try {
                    const url = '/api/search?q=' + encodeURIComponent(q) + '&limit=50';
                    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    if (seq !== this._seq) return;  // stale response, ignore
                    this.results = Array.isArray(data) ? data : [];
                    this.selected = 0;
                } catch (e) {
                    if (seq !== this._seq) return;
                    this.results = [];
                    if (window.pqlToast) window.pqlToast.error('Search failed: ' + e.message);
                } finally {
                    if (seq === this._seq) this.loading = false;
                }
            },

            select(idx) {
                const list = this.query ? this.results : this.recent;
                const hit = list[idx];
                if (!hit || !hit.url) return;
                this.pushRecent(hit);
                this.closePalette();
                window.location.href = hit.url;
            },

            pushRecent(hit) {
                const entry = {
                    type: hit.type,
                    label: hit.label,
                    description: hit.description || '',
                    url: hit.url,
                };
                const next = [entry].concat(
                    this.recent.filter((r) => r.url !== entry.url)
                ).slice(0, RECENT_MAX);
                this.recent = next;
                saveRecent(next);
            },
        };
    };
})();
</script>
