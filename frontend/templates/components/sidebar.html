<aside class="pql-sidebar border-end"
       x-data="catalogTree()"
       x-init="load()"
       @htmx:after-swap.window="activePath = pathFromUrl()">
    <div class="p-3 d-flex align-items-center justify-content-between border-bottom">
        <span class="text-uppercase small fw-semibold text-muted">Catalog</span>
        <button class="btn btn-sm btn-link p-0 text-muted" @click="reload()" title="Refresh">
            <i class="bi bi-arrow-clockwise" :class="loading ? 'pql-spin' : ''"></i>
        </button>
    </div>

    <div class="pql-sidebar-body">
        <template x-if="error">
            <div class="alert alert-danger m-2 small" x-text="error"></div>
        </template>

        <template x-if="!tree && !error">
            <div class="text-muted small p-3">
                <span class="spinner-border spinner-border-sm me-1"></span>Loading…
            </div>
        </template>

        <ul class="list-unstyled mb-0" x-show="tree" x-cloak>
            <template x-for="c in (tree || [])" :key="c.name">
                <li>
                    <div class="pql-tree-item"
                         :class="{ active: activePath.catalog === c.name && !activePath.schema }">
                        <button class="pql-tree-chevron" @click="toggle('c:' + c.name)"
                                :aria-expanded="isOpen('c:' + c.name)">
                            <i class="bi" :class="isOpen('c:' + c.name) ? 'bi-chevron-down' : 'bi-chevron-right'"></i>
                        </button>
                        <a :href="'/catalogs/' + c.name" class="pql-tree-label">
                            <i class="bi" :class="c.connection_name ? 'bi-plug' : 'bi-folder2'"
                               :title="c.connection_name ? 'Foreign catalog (' + c.connection_name + ')' : 'Managed catalog'"></i>
                            <span class="text-truncate" x-text="c.name"></span>
                            <template x-if="c.connection_name">
                                <span class="badge bg-info text-dark ms-auto"
                                      style="font-size: 0.65rem;">FOREIGN</span>
                            </template>
                        </a>
                    </div>

                    <ul class="list-unstyled mb-0" x-show="isOpen('c:' + c.name)" x-cloak>
                        <template x-for="s in (c.schemas || [])" :key="s.name">
                            <li>
                                <div class="pql-tree-item pql-tree-lvl-2"
                                     :class="{ active: activePath.catalog === c.name && activePath.schema === s.name && !activePath.table }">
                                    <button class="pql-tree-chevron" @click="toggle('s:' + c.name + '.' + s.name)"
                                            :aria-expanded="isOpen('s:' + c.name + '.' + s.name)">
                                        <i class="bi" :class="isOpen('s:' + c.name + '.' + s.name) ? 'bi-chevron-down' : 'bi-chevron-right'"></i>
                                    </button>
                                    <a :href="'/catalogs/' + c.name + '/schemas/' + s.name" class="pql-tree-label">
                                        <i class="bi bi-collection"></i>
                                        <span class="text-truncate" x-text="s.name"></span>
                                    </a>
                                </div>

                                <ul class="list-unstyled mb-0" x-show="isOpen('s:' + c.name + '.' + s.name)" x-cloak>
                                    <template x-for="t in (s.tables || [])" :key="t.name">
                                        <li>
                                            <div class="pql-tree-item pql-tree-lvl-3"
                                                 :class="{ active: activePath.catalog === c.name && activePath.schema === s.name && activePath.table === t.name }">
                                                <span class="pql-tree-chevron"></span>
                                                <a :href="'/catalogs/' + c.name + '/schemas/' + s.name + '/tables/' + t.name" class="pql-tree-label">
                                                    <i class="bi bi-table"></i>
                                                    <span class="text-truncate" x-text="t.name"></span>
                                                </a>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </li>
                        </template>
                    </ul>
                </li>
            </template>
        </ul>
    </div>
</aside>

<script>
(function () {
    const STORAGE_KEY = 'pql.tree';
    const OPEN_KEY = 'pql.tree.open';

    function pathFromUrl() {
        const m = window.location.pathname.match(
            /^\/catalogs\/([^\/]+)(?:\/schemas\/([^\/]+)(?:\/tables\/([^\/]+))?)?/
        );
        if (!m) return { catalog: '', schema: '', table: '' };
        return { catalog: m[1] || '', schema: m[2] || '', table: m[3] || '' };
    }
    window.pathFromUrl = pathFromUrl;

    window.catalogTree = function () {
        return {
            tree: null,
            loading: false,
            error: null,
            open: {},
            activePath: pathFromUrl(),

            isOpen(key) { return !!this.open[key]; },

            toggle(key) {
                this.open[key] = !this.open[key];
                try { sessionStorage.setItem(OPEN_KEY, JSON.stringify(this.open)); } catch (e) {}
            },

            async load() {
                let hadOpenState = false;
                try {
                    const cached = sessionStorage.getItem(STORAGE_KEY);
                    if (cached) this.tree = JSON.parse(cached);
                    const openCached = sessionStorage.getItem(OPEN_KEY);
                    if (openCached) {
                        this.open = JSON.parse(openCached);
                        hadOpenState = true;
                    }
                } catch (e) {}

                if (!hadOpenState) {
                    if (this.activePath.catalog) this.open['c:' + this.activePath.catalog] = true;
                    if (this.activePath.catalog && this.activePath.schema) {
                        this.open['s:' + this.activePath.catalog + '.' + this.activePath.schema] = true;
                    }
                    try { sessionStorage.setItem(OPEN_KEY, JSON.stringify(this.open)); } catch (e) {}
                }

                if (!this.tree) await this.fetchTree();
                else this.fetchTree();
            },

            async reload() {
                try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
                this.tree = null;
                await this.fetchTree();
            },

            async fetchTree() {
                this.loading = true;
                this.error = null;
                try {
                    const res = await fetch('/api/tree');
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    this.tree = data;
                    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
                } catch (e) {
                    if (!this.tree) this.error = 'Failed to load tree: ' + e.message;
                } finally {
                    this.loading = false;
                }
            },
        };
    };
})();
</script>
