<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PointlesSQL{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body hx-boost="true"
      hx-target="#main-content"
      hx-select="#main-content"
      hx-swap="outerHTML show:window:top">
    <nav class="navbar navbar-expand bg-body-tertiary border-bottom px-3 pql-topbar">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-database"></i>
            <span class="fw-semibold">PointlesSQL</span>
        </a>
    </nav>

    <div class="pql-shell">
        {% include "components/sidebar.html" %}
        <main class="pql-content" id="main-content">
            {% block breadcrumbs %}{% endblock %}
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>
    <script src="/static/js/editable.js"></script>
    <script src="/static/js/properties_editor.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script>
        document.body.addEventListener('htmx:afterSwap', (e) => {
            if (window.Alpine && e.detail && e.detail.target) {
                window.Alpine.initTree(e.detail.target);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
