default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^notebooks/
      - id: end-of-file-fixer
        exclude: ^notebooks/
      - id: check-yaml
        # mkdocs.yml carries `!!python/name:…` tags for pymdownx
        # superfences; SafeLoader cannot resolve them so we run with
        # the unsafe loader (we trust our own YAML files).
        args: ["--unsafe"]
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
        # Curated launch media (the trailer video/GIF and the screenshot
        # gallery) lives under docs/assets/ and is intentionally larger
        # than the 512 KB guard that protects the rest of the tree. The
        # bandit SAST baseline (.bandit-baseline.json) is a generated
        # finding ledger whose size tracks the frozen finding count.
        exclude: ^(docs/assets/|\.bandit-baseline\.json$)
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.7.6
    hooks:
      - id: pydoclint
        args: ["--style=google", "--check-return-types=False", "--check-yield-types=False", "--allow-init-docstring=False"]
        files: ^pointlessql/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # Excludes:
        # - uv.lock — package hashes, never secrets
        # - tests/, frontend/, notebooks/ — test fixtures and JS deps
        # - docs/ — examples illustrating env vars / connection strings
        # - .env.example — documents the env vars (no real values)
        # - docker-compose*.yml — local-stack passwords, not prod
        # - pointlessql/alembic/versions/ — revision ids are hex
        #   high-entropy by design and would re-trigger every migration
        exclude: |
          (?x)^(
            uv\.lock|
            tests/|
            frontend/|
            notebooks/|
            docs/|
            \.env\.example|
            docker-compose.*\.yml|
            pointlessql/alembic/versions/
          )

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        # Enforces Conventional-Commits shape so the cliff-driven
        # CHANGELOG regen (scripts/regen-changelog.py) can categorise
        # every commit deterministically.  Activate locally with
        # ``uv run pre-commit install --hook-type commit-msg``.
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional@19.5.0"]

  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
      - id: biome-check
        # Lint + format gate for frontend/js/.  The hook auto-fetches
        # its own biome binary (no npm install required); config lives
        # in repo-root biome.json.  ``--diagnostic-level=error`` skips
        # warn/info noise from rules we kept on for visibility but do
        # not block on (useTemplate, useOptionalChain, noUnusedVariables).
        files: ^frontend/js/.*\.(js|mjs)$
        args: ["--diagnostic-level=error"]

  - repo: local
    hooks:
      - id: no-phase-refs
        name: no phase/sprint/wave/BUG refs in frontend source
        entry: bash scripts/check-no-phase-refs.sh
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: form-labels
        name: form-label A11y drift guard
        entry: bash scripts/check-form-labels.sh
        language: system
        pass_filenames: false
        files: ^frontend/templates/.*\.html$
      - id: theme-boot-order
        name: theme_boot.js precedes the first stylesheet
        entry: bash scripts/check-theme-boot-order.sh
        language: system
        pass_filenames: false
        files: ^(frontend/templates/(base.*\.html|_layouts/.*\.html)|frontend/js/theme_boot\.js)$
      - id: frontend-bootstrap-budget
        name: bootstrap.js window-global budget
        entry: bash scripts/check-frontend-bootstrap-budget.sh
        language: system
        pass_filenames: false
        files: ^frontend/js/(bootstrap\.js|entries/.*)$
      - id: frontend-raw-fetch-budget
        name: raw-fetch budget (use pqlApi.fetch)
        entry: bash scripts/check-frontend-raw-fetch-budget.sh
        language: system
        pass_filenames: false
        files: ^frontend/js/.*\.js$
      - id: sync-bridge
        name: api layer routes blocking work through run_sync
        entry: bash scripts/check-sync-bridge.sh
        language: system
        pass_filenames: false
        files: ^pointlessql/api/.*\.py$
      - id: typed-principal
        name: request.state.user confined to its owner modules
        entry: bash scripts/check-typed-principal.sh
        language: system
        pass_filenames: false
        files: ^pointlessql/.*\.py$
      - id: doc-orphans
        name: doc-tree orphan guard (mkdocs nav vs filesystem)
        entry: bash scripts/check-doc-orphans.sh
        language: system
        pass_filenames: false
        files: ^(docs/.*\.md|mkdocs\.yml)$
      - id: pyright
        name: pyright (strict)
        entry: uv run pyright pointlessql
        language: system
        pass_filenames: false
        types: [python]
        files: ^pointlessql/
      - id: file-size-budget
        name: pointlessql file-size budget
        entry: bash scripts/check-file-size-budget.sh
        language: system
        pass_filenames: false
        files: ^pointlessql/.*\.py$
      - id: pyright-warning-budget
        name: pyright warning-floor budget
        entry: bash scripts/check-pyright-budget.sh
        language: system
        pass_filenames: false
        files: ^pointlessql/
      - id: dump-openapi
        name: regenerate docs/reference/_generated/openapi.json
        entry: uv run python scripts/dump-openapi.py
        language: system
        pass_filenames: false
        files: ^pointlessql/api/.*\.py$
