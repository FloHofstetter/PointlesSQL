default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^notebooks/
      - id: end-of-file-fixer
        exclude: ^notebooks/
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.0
    hooks:
      - id: pydoclint
        args: ["--style=google", "--check-return-types=False", "--check-yield-types=False", "--allow-init-docstring=False"]
        files: ^pointlessql/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: ^(uv\.lock|tests/|frontend/|notebooks/)

  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: uv run pyright pointlessql
        language: system
        pass_filenames: false
        types: [python]
        files: ^pointlessql/
