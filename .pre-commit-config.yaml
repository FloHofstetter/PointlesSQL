default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^notebooks/
      - id: end-of-file-fixer
        exclude: ^notebooks/
      - id: check-yaml
        # mkdocs.yml carries `!!python/name:…` tags for pymdownx
        # superfences; SafeLoader cannot resolve them so we run with
        # the unsafe loader (we trust our own YAML files).
        args: ["--unsafe"]
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.0
    hooks:
      - id: pydoclint
        args: ["--style=google", "--check-return-types=False", "--check-yield-types=False", "--allow-init-docstring=False"]
        files: ^pointlessql/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # Excludes:
        # - uv.lock — package hashes, never secrets
        # - tests/, frontend/, notebooks/ — test fixtures and JS deps
        # - docs/ — examples illustrating env vars / connection strings
        # - .env.example — documents the env vars (no real values)
        # - docker-compose*.yml — local-stack passwords, not prod
        # - pointlessql/alembic/versions/ — revision ids are hex
        #   high-entropy by design and would re-trigger every migration
        exclude: |
          (?x)^(
            uv\.lock|
            tests/|
            frontend/|
            notebooks/|
            docs/|
            \.env\.example|
            docker-compose.*\.yml|
            pointlessql/alembic/versions/
          )

  - repo: local
    hooks:
      - id: no-phase-refs
        name: no phase/sprint/wave/BUG refs in frontend source
        entry: bash scripts/check-no-phase-refs.sh
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: pyright
        name: pyright (strict)
        entry: uv run pyright pointlessql
        language: system
        pass_filenames: false
        types: [python]
        files: ^pointlessql/
      - id: file-size-budget
        name: pointlessql file-size budget
        entry: bash scripts/check-file-size-budget.sh
        language: system
        pass_filenames: false
        files: ^pointlessql/.*\.py$
      - id: pyright-warning-budget
        name: pyright warning-floor budget
        entry: bash scripts/check-pyright-budget.sh
        language: system
        pass_filenames: false
        files: ^pointlessql/
