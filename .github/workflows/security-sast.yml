# Static application security testing (SAST).
#
# Runs bandit over the application package at medium-and-above severity
# (-ll) against a committed finding baseline (.bandit-baseline.json). The
# baseline freezes the known pre-existing findings as the floor, so the gate
# passes today and fails only when a change introduces a NEW, non-baselined
# finding — the same budget-gate shape as the pyright / file-size gates.
# Regenerate the baseline deliberately (and review the delta in the diff)
# whenever a finding is genuinely resolved or accepted:
#   uv run bandit -r pointlessql -ll --ini .bandit -f json -o .bandit-baseline.json
#
# pip-audit (dependency CVEs) already runs in test.yml; detect-secrets gating
# needs a committed `.detect-secrets.baseline` (generate with
# `uv run detect-secrets scan > .detect-secrets.baseline`) and is a follow-up.
name: security-sast

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Bandit (medium+ severity, against committed baseline)
        run: uv run bandit -r pointlessql -ll --ini .bandit -b .bandit-baseline.json
