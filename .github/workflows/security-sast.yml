# Static application security testing (SAST).
#
# Runs bandit over the application package at high severity. Kept
# non-blocking (continue-on-error) until the finding floor is calibrated on
# a few green runs — same ramp the e2e-browser job used. Flip to blocking by
# removing `continue-on-error` once the baseline is clean.
#
# pip-audit (dependency CVEs) already runs in test.yml; detect-secrets gating
# needs a committed `.detect-secrets.baseline` (generate with
# `uv run detect-secrets scan > .detect-secrets.baseline`) and is a follow-up.
name: security-sast

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Bandit (high severity)
        run: uv run bandit -r pointlessql -ll --ini .bandit
