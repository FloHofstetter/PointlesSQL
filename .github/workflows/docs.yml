name: Docs

# Manual-only docs build + link-check.  No public deploy yet.
# The launch-sprint flip swaps `workflow_dispatch:` for `push:`,
# uncomments the mike-deploy step + permissions block, and
# triggers the first gh-pages publish at
# flohofstetter.github.io/PointlesSQL.  Until then this workflow
# proves the build is green + cross-links are clean without
# making the docs URL public.
#
# To flip live (launch sprint):
#   1. Replace `workflow_dispatch:` with the commented-out
#      `push:` block below.
#   2. Uncomment the `mike deploy` step + the permissions block.
#   3. Repo visibility flips public (separate gh CLI call).
#   4. README badge points at flohofstetter.github.io/PointlesSQL.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "docs/**"
  #     - "mkdocs.yml"
  #     - "CHANGELOG.md"

permissions:
  contents: write
  # Needed when push trigger flips live (launch sprint):
  # pages: write
  # id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync --group docs
      - run: uv run mkdocs build --strict
      # Launch-sprint mike deploy (uncomment + bump version when going live):
      # - name: Configure git for mike
      #   run: |
      #     git config user.name "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      # - run: uv run mike deploy --push --update-aliases rc173 latest

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --timeout 20
            --exclude-path .git
            --exclude-path docs/internal
            --exclude-mail
            './docs/**/*.md' 'README.md' 'CHANGELOG.md' 'CONTRIBUTING.md'
          fail: true
