name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pyright warning-floor budget (Sprint 35.8)
        # Sprint 35.8 freezes the post-Phase-35 warning count so future
        # work cannot silently regress.  Errors must always be 0;
        # warnings cap is set in scripts/check-pyright-budget.sh.
        run: bash scripts/check-pyright-budget.sh
      - name: File-size budget (Sprint 35.8)
        # Sprint 35.8 prevents new pointlessql/**.py files from
        # exceeding 800 LOC.  Files that are big-by-design are listed
        # explicitly in scripts/check-file-size-budget.sh's allowlist.
        run: bash scripts/check-file-size-budget.sh
      - name: Sync-bridge drift gate
        # Request-path code must dispatch blocking work through the
        # app-owned executor (services/_executor.run_sync), never
        # asyncio.to_thread / raw run_in_executor.  Background loops
        # under api/_bootstrap/_loops/ are allowlisted by the script.
        run: bash scripts/check-sync-bridge.sh
      - name: Typed-principal drift gate
        # Raw request.state.user access is confined to the auth
        # middleware (producer) and dependencies/_principal.py
        # (accessors); routes use get_user / get_optional_user.
        run: bash scripts/check-typed-principal.sh
      - name: Pydoclint (Google style)
        # Phase 74.CI.1 — force-reinstall docstring-parser-fork
        # immediately before pydoclint runs.  pydoclint imports
        # ``DocstringYields`` from ``docstring_parser.common``; the
        # symbol only ships in the fork variant.  anthropic>=0.40
        # transitively pulls the upstream ``docstring-parser`` and
        # the two wheels share the ``site-packages/docstring_parser/``
        # directory — uv's parallel wheel extraction is non-
        # deterministic, so the upstream files can win the race.  A
        # ``--force-reinstall`` of the fork right before pydoclint
        # runs guarantees the fork's files are the ones on disk.
        run: |
          uv pip install --force-reinstall docstring-parser-fork
          uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        # Fresh runner has no pointlessql.db — `alembic check`
        # needs a migrated target to compare against, not an empty
        # file. Upgrade to head first (creates the sqlite file at
        # the latest revision), then check compares ORM models.
        run: |
          uv run alembic upgrade head
          uv run alembic check
      - name: Frontend — bootstrap.js precedes Alpine CDN
        # Sprint-75 ESM-bridge ordering gate.  Asserts base.html keeps
        # ``<script type="module" src=".../bootstrap.js">`` before the
        # Alpine CDN script, so any factory migrated out of a legacy
        # IIFE file lands on ``window`` before Alpine's x-data walk.
        run: bash scripts/check-frontend-bootstrap-order.sh
      - name: Frontend — Biome (format + lint) gate
        # Reads repo-root biome.json (2-space, single-quote, semicolons,
        # trailingCommas=es5, lineWidth=100) plus the recommended
        # ruleset.  Hook auto-fetches the binary; no npm install on the
        # runner.  Read-only check — CI fails on drift, fix with
        # ``biome check --write frontend/js/`` locally.
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.15
      - name: Run biome check
        run: biome check --diagnostic-level=error frontend/js/
      - name: Frontend — JS unit tests (node:test)
        # Zero-dependency harness: colocated *.test.js files under
        # frontend/js/ run on Node's built-in test runner.  The scoped
        # frontend/js/package.json carries only {"type": "module"} so
        # Node parses the production ESM files; there is deliberately
        # no root package.json, lockfile, or npm install.
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run JS unit tests
        run: node --test "frontend/js/**/*.test.js"
      - name: Frontend — theme-boot ordering gate
        # theme_boot.js must precede the first stylesheet in every
        # layout so data-bs-theme is set before CSS parses (no theme
        # flash on first paint).
        run: bash scripts/check-theme-boot-order.sh
      - name: Frontend — bootstrap window-global budget
        # Ratchet on bootstrap.js window registrations: new page
        # factories land as frontend/js/entries/ modules behind
        # {% block page_entry %}, not as another global.
        run: bash scripts/check-frontend-bootstrap-budget.sh
      - name: Frontend — raw-fetch budget
        # Ratchet on raw fetch( call sites: new code uses
        # window.pqlApi.fetch (CSRF + X-Workspace + uniform errors).
        run: bash scripts/check-frontend-raw-fetch-budget.sh
      - name: Frontend — Form-label A11y drift guard
        # W8 drift-guard.  Counts <input>/<select>/<textarea> in
        # frontend/templates/ that lack any of: aria-label,
        # aria-labelledby, sibling <label for=…> matching id, or
        # wrapping <label>…</label>.  Fails if the count exceeds
        # FORM_LABEL_THRESHOLD (default 75; baseline after W8 is ~63).
        # Raise the threshold only with a written justification —
        # otherwise add the missing label so screen-readers
        # announce the field name programmatically (WCAG 1.3.1 +
        # 4.1.2).  See frontend/templates/_macros/labeled_input.html
        # for the macro to use.
        run: bash scripts/check-form-labels.sh
      - name: Docs — orphan-file drift guard
        # W1 drift-guard.  Compares the markdown files under docs/
        # with mkdocs.yml nav: / not_in_nav: / exclude_docs: entries
        # and fails if the orphan count exceeds DOC_ORPHAN_THRESHOLD
        # (default 18; baseline after W1.5 is the 18 e2e-walkthrough
        # files that stay orphan until W5 introduces theme-grouped
        # sub-nav).  Catches the "new page forgot to wire into nav"
        # mistake before mkdocs --strict surfaces it.  See
        # docs/internal/doc-site-ia.md for the contract.
        run: bash scripts/check-doc-orphans.sh
      - name: Pytest with coverage
        # Runs the unit-test suite (integration + postgres markers
        # excluded by pyproject's addopts).  The --cov-fail-under
        # threshold is set to 55% — three points below the
        # 2026-04-26 baseline (60%) to absorb noise without inviting
        # silent regressions.  The deselect list that used to live
        # here is retired: every entry was either fixed in-place or
        # deleted alongside its removed feature, so the gate now runs
        # the suite unfiltered.  If a test must ever be parked again,
        # add a --deselect line with a comment naming the owner and
        # delete it the moment the test is fixed — the gate must
        # regress visibly if a previously-green test starts failing.
        # ``-n auto`` parallelises across the runner's vCPUs
        # (free-tier Linux runners report 4); xdist is already in the
        # dev dependency group and the session-scope schema fixture
        # is per-worker, so workers don't share DB state.
        run: |
          uv run pytest -q \
            -n auto \
            --cov=pointlessql \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=55
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  e2e-browser:
    name: e2e — headless multi-tab co-edit
    runs-on: ubuntu-latest
    needs: gate
    # Phase 108.2 — the headless multi-tab co-edit gate.  Lands behind
    # ``continue-on-error: true`` for the first wave of green runs so a
    # transient flake (port collision, Chromium boot timeout, slow
    # WebSocket sync on a noisy runner) does not block unrelated PRs.
    # Flip to ``false`` once we've collected ~10 successive green runs
    # — track via the Memory entry that lands with this commit.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Install Playwright Chromium
        # ``--with-deps`` pulls the apt packages Chromium needs at
        # runtime on the GitHub Ubuntu runner.  Adds ~30 s on a cold
        # cache; the uv cache covers the wheel, only the browser
        # binary needs the download every time.
        run: uv run playwright install chromium --with-deps
      - name: Pytest — e2e (multi-tab co-edit + smoke)
        # ``testpaths = ["tests"]`` plus the default ``addopts``
        # already deselect e2e for normal lanes.  We point pytest at
        # ``e2e/`` explicitly here and pass ``-m e2e`` for an extra
        # safety belt — anything in ``e2e/`` that forgot the marker
        # would be silently ignored.
        run: uv run pytest -q e2e/ -m e2e

  postgres:
    name: postgres dialect lane
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pointlessql
          POSTGRES_PASSWORD: pointlessql  # pragma: allowlist secret
          POSTGRES_DB: pointlessql
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pointlessql"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://pointlessql:pointlessql@localhost:5432/pointlessql  # pragma: allowlist secret
      POINTLESSQL_DB_URL: postgresql+psycopg://pointlessql:pointlessql@localhost:5432/pointlessql  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Alembic — fresh upgrade + autogen-drift against Postgres
        # Sprint 30.0 dialect-drift fence.  The SQLite-side gate already
        # runs ``alembic upgrade head`` on a fresh sqlite file; this PG
        # job runs the same chain against a fresh Postgres so any
        # SQLite-only DDL pattern (boolean ``DEFAULT 0`` literals,
        # PRAGMA, FTS5 vtables) surfaces in CI rather than at deploy
        # time.  The ``POINTLESSQL_DB_URL`` override is honoured by
        # ``pointlessql/alembic/env.py``.
        # Sprint H.4 — add the missing ``alembic check`` against the
        # freshly upgraded PG.  SQLite-side has caught autogen drift
        # since Phase 30; the PG side did not, so dialect-asymmetric
        # drift (PG-only ``server_default``, partial indexes, etc.)
        # could accumulate silently.
        run: |
          uv run alembic upgrade head
          uv run alembic check
      - name: Provision per-worker Postgres databases
        # Sprint H.6 — pytest-xdist needs each worker to operate on
        # its own DB so per-test ``TRUNCATE`` doesn't clobber
        # peers' rows.  Create ``pointlessql_gw{0..3}`` to match
        # ``-n 4`` below; ``tests/conftest.py`` reads
        # ``PYTEST_XDIST_WORKER`` (e.g. ``gw0``) and appends ``_gw0``
        # to the ``TEST_DATABASE_URL`` path component.
        env:
          PGPASSWORD: pointlessql  # pragma: allowlist secret
        run: |
          for worker in gw0 gw1 gw2 gw3; do
            PGPASSWORD="$PGPASSWORD" psql -h localhost -U pointlessql -d pointlessql \
              -c "CREATE DATABASE pointlessql_${worker};"
          done
      - name: Pytest against Postgres
        # Runs unfiltered, mirroring the SQLite lane (whose deselect
        # list is retired — see the comment there).  Coverage
        # reporting is dropped (the SQLite lane already publishes the
        # artifact) to keep the PG run fast.
        # Per-worker DBs (above) plus the ``PYTEST_XDIST_WORKER``
        # branch in ``tests/conftest.py`` keep TRUNCATEs isolated.
        # ``--dist loadfile`` keeps tests in the same file on the
        # same worker so module-scope fixtures don't get split.
        run: |
          uv run pytest -q -n 4 --dist loadfile

  security-audit:
    name: dependency CVE scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pip-audit
        # ``--skip-editable`` excludes the local ``pointlessql`` install
        # (editable wheel has no PyPI release to compare against). The
        # ``soyuz-catalog-client`` is also auto-skipped with a
        # "could not be audited" reason since its source is a git tag,
        # not PyPI. We deliberately omit ``--strict`` so those
        # skips don't fail the job; any third-party PyPI dep with a
        # known CVE still fails because pip-audit exits non-zero on
        # actual findings. Run on every PR to catch new advisories
        # against the locked versions.
        # CVE-2026-1839 (transformers, via the optional vector extra)
        # is ignored until its fix ships in a stable release — the
        # only fixed version is the 5.0.0rc3 pre-release, which the
        # sentence-transformers pin cannot take yet. Drop the ignore
        # once transformers 5.x final is locked.
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2026-1839
