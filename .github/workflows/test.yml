name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: PointlesSQL
      # Clone soyuz-catalog as a sibling directory so uv can
      # resolve the client via a local path dep. This is the
      # "sibling checkout" pattern — avoids fighting uv's git
      # subprocess auth, because actions/checkout handles the
      # private-repo fetch via its own battle-tested token flow.
      # The ref pins the exact soyuz-catalog commit PointlesSQL's
      # pyproject.toml otherwise pins via git tag.
      - uses: actions/checkout@v4
        with:
          repository: FloHofstetter/soyuz-catalog
          ref: v0.2.0rc2
          token: ${{ secrets.SOYUZ_READ_TOKEN }}
          path: soyuz-catalog
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        working-directory: PointlesSQL
        run: uv python install 3.14
      - name: Override soyuz-catalog-client to sibling path
        working-directory: PointlesSQL
        # Drop a gitignored uv.toml that overrides
        # [tool.uv.sources] in pyproject.toml to use the sibling
        # checkout as an editable path dep. Identical to the
        # developer escape hatch documented in CLAUDE.md.
        run: |
          cat > uv.toml <<'EOF'
          [sources]
          soyuz-catalog-client = { path = "../soyuz-catalog/soyuz-catalog-client", editable = true }
          EOF
      - name: Install dependencies
        working-directory: PointlesSQL
        run: uv sync --all-extras
      - name: Ruff
        working-directory: PointlesSQL
        run: uv run ruff check .
      - name: Pyright
        working-directory: PointlesSQL
        run: uv run pyright
      - name: Pydoclint (Google style)
        working-directory: PointlesSQL
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        working-directory: PointlesSQL
        run: uv run alembic check
