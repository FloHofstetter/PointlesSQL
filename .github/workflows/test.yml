name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    # soyuz-catalog-client is pinned to a private-repo git tag
    # under [tool.uv.sources]. `uv sync` needs a credential with
    # read access. The `SOYUZ_READ_TOKEN` repo secret is a fine-
    # grained PAT scoped read-only to the soyuz-catalog repo.
    # GH_TOKEN lives at job-level so *every* step (gh auth
    # setup-git below, but also `uv sync` which calls git via a
    # subprocess that inherits env) sees it.
    env:
      GH_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for private soyuz-catalog pull
        run: |
          # `gh auth setup-git` installs a credential helper that
          # reads GH_TOKEN and returns it for any github.com URL.
          # Works uniformly for PATs and installation tokens;
          # avoids the basic-auth URL-shape landmines (neither
          # `<token>@` nor `x-access-token:<token>@` are accepted
          # for PATs).
          gh auth setup-git
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
