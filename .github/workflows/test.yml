name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    # soyuz-catalog-client is pinned to a private-repo git tag
    # under [tool.uv.sources]. `uv sync` invokes git internally
    # to clone the tag. For that clone to succeed, git needs a
    # credential for `github.com/FloHofstetter/soyuz-catalog`.
    #
    # `GIT_CONFIG_COUNT` + `GIT_CONFIG_KEY_N` + `GIT_CONFIG_VALUE_N`
    # inject a git config entry via environment — this is read by
    # every git invocation, including ones spawned under a modified
    # HOME that doesn't point at the runner's `~/.gitconfig`. We
    # reached this form after four earlier attempts failed:
    #   1. `https://x-access-token:<token>@github.com/...` URL
    #      rewrite → rejected ("Password authentication is not
    #      supported for Git operations")
    #   2. `https://<token>@github.com/...` (bare token, empty
    #      password) → same rejection
    #   3. `gh auth setup-git` credential helper → produced
    #      credentials that GitHub didn't accept for this PAT
    #   4. `git config --global http.<prefix>.extraheader` →
    #      entry didn't reach uv's git subprocess (likely HOME
    #      divergence under setup-uv's cache dir)
    # The Bearer header via GIT_CONFIG_COUNT bypasses basic auth
    # entirely and is immune to HOME mismatches.
    env:
      GH_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "http.https://github.com/.extraheader"
      GIT_CONFIG_VALUE_0: "Authorization: Bearer ${{ secrets.SOYUZ_READ_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
