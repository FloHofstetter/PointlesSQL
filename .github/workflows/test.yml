name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        # soyuz-catalog-client is pinned to a private-repo git tag
        # under [tool.uv.sources]. `uv sync` invokes git internally
        # to clone the tag; git needs a credential for
        # `github.com/FloHofstetter/soyuz-catalog`.
        #
        # `GIT_CONFIG_COUNT` + `GIT_CONFIG_KEY_N` + `GIT_CONFIG_VALUE_N`
        # inject a config entry via environment, read by every git
        # invocation. Scoped to THIS step only so it does not
        # conflict with the Authorization header `actions/checkout@v4`
        # adds on the repo-fetch invocation above (both would apply
        # → GitHub returns `400 Duplicate header: "Authorization"`).
        #
        # We reached this form after six earlier attempts:
        #   1. `x-access-token:<token>@` URL rewrite → rejected
        #   2. `<token>@` URL (bare, empty password) → rejected
        #   3. `gh auth setup-git` helper → creds not accepted
        #   4. `git config --global http.<prefix>.extraheader` →
        #      didn't reach uv's git subprocess
        #   5. GIT_CONFIG_COUNT at job level, broad scope →
        #      collided with actions/checkout (dup Authorization)
        #   6. GIT_CONFIG_COUNT at job level, narrow scope →
        #      git URL-match didn't hit (narrow didn't apply)
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: "http.https://github.com/.extraheader"
          GIT_CONFIG_VALUE_0: "Authorization: Bearer ${{ secrets.SOYUZ_READ_TOKEN }}"
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
