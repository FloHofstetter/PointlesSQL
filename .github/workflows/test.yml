name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Rewrite HTTPS clones of github.com to tunnel through the
      # SOYUZ_READ_TOKEN (classic PAT, Contents: Read on the private
      # soyuz-catalog repo). `uv sync` resolves the pinned
      # `[tool.uv.sources]` git-tag source directly — no sibling
      # checkout, no uv.toml override.
      - name: Configure git for private soyuz-catalog pull
        env:
          SOYUZ_READ_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
        run: |
          # Preflight: catch an empty / truncated / typo'd secret
          # before we get the inscrutable
          # `remote: Invalid username or token` from git. Classic PATs
          # are 40 chars (ghp_ + 36); fine-grained PATs are ~93 chars.
          LEN=$(printf '%s' "$SOYUZ_READ_TOKEN" | wc -c)
          if [ "$LEN" -lt 30 ]; then
            echo "::error::SOYUZ_READ_TOKEN is missing or truncated (${LEN} bytes). Re-paste it in Settings → Secrets → Actions." >&2
            exit 1
          fi
          # Validate that GitHub actually accepts the PAT. An expired
          # or revoked PAT returns 401 from /user — which is the
          # cheapest way to surface the right error before uv spends
          # a minute resolving dependencies.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${SOYUZ_READ_TOKEN}" \
            https://api.github.com/user)
          if [ "$STATUS" != "200" ]; then
            echo "::error::SOYUZ_READ_TOKEN is not accepted by GitHub (GET /user → HTTP ${STATUS}). The PAT may be revoked, expired, or corrupted during paste." >&2
            exit 1
          fi
          git config --global \
            url."https://x-access-token:${SOYUZ_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        # Fresh runner has no pointlessql.db — `alembic check`
        # needs a migrated target to compare against, not an empty
        # file. Upgrade to head first (creates the sqlite file at
        # the latest revision), then check compares ORM models.
        run: |
          uv run alembic upgrade head
          uv run alembic check
      - name: Frontend — BUG-64-02 reactivity-boundary gate
        # Sprint-65 grep gate.  Fails on `this._(editor|model|...)`
        # assignments inside frontend/js/notebook/ — those refs MUST
        # live in closure scope (see closure_state.js + commit
        # 0af7984).  Pure shell, no Python venv needed.
        run: bash scripts/check-frontend-no-reactive-monaco.sh
      - name: Frontend — bootstrap.js precedes Alpine CDN
        # Sprint-75 ESM-bridge ordering gate.  Asserts base.html keeps
        # ``<script type="module" src=".../bootstrap.js">`` before the
        # Alpine CDN script, so any factory migrated out of a legacy
        # IIFE file lands on ``window`` before Alpine's x-data walk.
        run: bash scripts/check-frontend-bootstrap-order.sh
      - name: Pytest with coverage
        # Runs the unit-test suite (integration + postgres markers
        # excluded by pyproject's addopts).  The --cov-fail-under
        # threshold is set to 55% — three points below the
        # 2026-04-26 baseline (60%) to absorb noise without inviting
        # silent regressions.  Twelve tests are deselected below;
        # they were already failing on main when this gate was
        # introduced and need separate investigation (full list in
        # QUALITY_FINAL.md).  Once a deselected test is fixed,
        # delete its line — the gate must regress visibly if a
        # previously-green test starts failing.
        # Phase 31.4 — ``-n auto`` parallelises across the runner's
        # vCPUs (free-tier Linux runners report 4); xdist is already
        # in the dev dependency group and Phase 31.2's session-scope
        # schema fixture is per-worker, so workers don't share DB
        # state.
        run: |
          uv run pytest -q \
            -n auto \
            --cov=pointlessql \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=55 \
            --deselect tests/test_api_notebook_workspace.py::test_upload_happy_path \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_non_ipynb_extension \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_invalid_json \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_traversal \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_existing_without_overwrite \
            --deselect tests/test_api_notebook_workspace.py::test_upload_overwrite_replaces_existing \
            --deselect tests/test_api_notebook_workspace.py::test_upload_non_admin_forbidden \
            --deselect tests/test_scheduler_papermill.py::test_executor_writes_output_and_forwards_principal \
            --deselect tests/test_scheduler_papermill.py::test_render_route_serves_nbconvert_html \
            --deselect tests/test_scheduler_papermill.py::test_download_ipynb_serves_raw_file \
            --deselect tests/test_scheduler_papermill.py::test_download_html_triggers_render \
            --deselect tests/test_table_stats.py::test_profile_enforces_select
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  postgres:
    name: postgres dialect lane
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pointlessql
          POSTGRES_PASSWORD: pointlessql
          POSTGRES_DB: pointlessql
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pointlessql"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://pointlessql:pointlessql@localhost:5432/pointlessql
      POINTLESSQL_DB_URL: postgresql+psycopg://pointlessql:pointlessql@localhost:5432/pointlessql
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for private soyuz-catalog pull
        env:
          SOYUZ_READ_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
        run: |
          LEN=$(printf '%s' "$SOYUZ_READ_TOKEN" | wc -c)
          if [ "$LEN" -lt 30 ]; then
            echo "::error::SOYUZ_READ_TOKEN is missing or truncated (${LEN} bytes). Re-paste it in Settings → Secrets → Actions." >&2
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${SOYUZ_READ_TOKEN}" \
            https://api.github.com/user)
          if [ "$STATUS" != "200" ]; then
            echo "::error::SOYUZ_READ_TOKEN is not accepted by GitHub (GET /user → HTTP ${STATUS})." >&2
            exit 1
          fi
          git config --global \
            url."https://x-access-token:${SOYUZ_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Alembic — fresh upgrade against Postgres
        # Sprint 30.0 dialect-drift fence.  The SQLite-side gate already
        # runs ``alembic upgrade head`` on a fresh sqlite file; this PG
        # job runs the same chain against a fresh Postgres so any
        # SQLite-only DDL pattern (boolean ``DEFAULT 0`` literals,
        # PRAGMA, FTS5 vtables) surfaces in CI rather than at deploy
        # time.  The ``POINTLESSQL_DB_URL`` override is honoured by
        # ``pointlessql/alembic/env.py``.
        run: uv run alembic upgrade head
      - name: Pytest against Postgres
        # Same deselects as the SQLite lane so we don't introduce a
        # silent regression — tests that were skipped on SQLite stay
        # skipped here.  Coverage reporting is dropped (the SQLite lane
        # already publishes the artifact) to keep the PG run fast.
        # Phase 31.4 — single-worker on the PG lane on purpose: a live
        # PG database can't be safely shared across workers because
        # the per-test ``TRUNCATE`` in one worker would clobber
        # another worker's rows mid-test.  Provisioning per-worker
        # DBs would shave another 50% off the PG run but adds CI
        # plumbing; deferred until the PG run becomes a cycle-time
        # bottleneck again.
        run: |
          uv run pytest -q \
            --deselect tests/test_api_notebook_workspace.py::test_upload_happy_path \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_non_ipynb_extension \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_invalid_json \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_traversal \
            --deselect tests/test_api_notebook_workspace.py::test_upload_rejects_existing_without_overwrite \
            --deselect tests/test_api_notebook_workspace.py::test_upload_overwrite_replaces_existing \
            --deselect tests/test_api_notebook_workspace.py::test_upload_non_admin_forbidden \
            --deselect tests/test_scheduler_papermill.py::test_executor_writes_output_and_forwards_principal \
            --deselect tests/test_scheduler_papermill.py::test_render_route_serves_nbconvert_html \
            --deselect tests/test_scheduler_papermill.py::test_download_ipynb_serves_raw_file \
            --deselect tests/test_scheduler_papermill.py::test_download_html_triggers_render \
            --deselect tests/test_table_stats.py::test_profile_enforces_select
