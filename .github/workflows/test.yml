name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Debug — show what git sees
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: "http.https://github.com/.extraheader"
          GIT_CONFIG_VALUE_0: "Authorization: Bearer ${{ secrets.SOYUZ_READ_TOKEN }}"
        run: |
          echo "=== env (GIT_CONFIG_*) ==="
          env | grep -i '^GIT_CONFIG' | sed 's/=.*Bearer.*/=Authorization: Bearer ***REDACTED***/'
          echo "=== git config --list ==="
          git config --list | sed 's/extraheader=.*/extraheader=***REDACTED***/' | head -20
          echo "=== direct git ls-remote test ==="
          git ls-remote https://github.com/FloHofstetter/soyuz-catalog HEAD 2>&1 | head -3 || echo "(failed)"
      - name: Install dependencies
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: "http.https://github.com/.extraheader"
          GIT_CONFIG_VALUE_0: "Authorization: Bearer ${{ secrets.SOYUZ_READ_TOKEN }}"
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
