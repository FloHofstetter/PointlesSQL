name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Rewrite HTTPS clones of github.com to tunnel through the
      # SOYUZ_READ_TOKEN (classic PAT, Contents: Read on the private
      # soyuz-catalog repo). `uv sync` resolves the pinned
      # `[tool.uv.sources]` git-tag source directly — no sibling
      # checkout, no uv.toml override.
      - name: Configure git for private soyuz-catalog pull
        env:
          SOYUZ_READ_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
        run: |
          # Non-leaking sanity check: classic PATs are ~40 chars
          # (ghp_ + 36), fine-grained PATs are ~93 chars
          # (github_pat_ + 82). A 1-byte secret means the org-secret
          # was typo'd when it was pasted into the GitHub UI.
          LEN=$(printf '%s' "$SOYUZ_READ_TOKEN" | wc -c)
          echo "SOYUZ_READ_TOKEN length: ${LEN}"
          if [ "$LEN" -lt 30 ]; then
            echo "::error::SOYUZ_READ_TOKEN is suspiciously short (${LEN} bytes) — re-paste the PAT in repo Settings → Secrets" >&2
            exit 1
          fi
          git config --global \
            url."https://x-access-token:${SOYUZ_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
