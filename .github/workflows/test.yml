name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Rewrite HTTPS clones of github.com to tunnel through the
      # SOYUZ_READ_TOKEN (classic PAT, Contents: Read on the private
      # soyuz-catalog repo). `uv sync` resolves the pinned
      # `[tool.uv.sources]` git-tag source directly — no sibling
      # checkout, no uv.toml override.
      - name: Configure git for private soyuz-catalog pull
        env:
          SOYUZ_READ_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
        run: |
          LEN=$(printf '%s' "$SOYUZ_READ_TOKEN" | wc -c)
          echo "SOYUZ_READ_TOKEN length: ${LEN}"
          if [ "$LEN" -lt 30 ]; then
            echo "::error::SOYUZ_READ_TOKEN is too short (${LEN} bytes)" >&2
            exit 1
          fi
          echo "=== scope probe: GET /user ==="
          curl -s -o /dev/null -w "status=%{http_code} scopes=%header{x-oauth-scopes}\n" \
            -H "Authorization: token ${SOYUZ_READ_TOKEN}" \
            https://api.github.com/user
          echo "=== scope probe: GET /repos/FloHofstetter/soyuz-catalog ==="
          curl -s -o /dev/null -w "status=%{http_code} scopes=%header{x-oauth-scopes}\n" \
            -H "Authorization: token ${SOYUZ_READ_TOKEN}" \
            https://api.github.com/repos/FloHofstetter/soyuz-catalog
          echo "=== git ls-remote via x-access-token:PAT ==="
          set +e
          git ls-remote "https://x-access-token:${SOYUZ_READ_TOKEN}@github.com/FloHofstetter/soyuz-catalog.git" HEAD 2>&1 | head -5
          echo "exit=$?"
          echo "=== git ls-remote via PAT-as-username only ==="
          git ls-remote "https://${SOYUZ_READ_TOKEN}@github.com/FloHofstetter/soyuz-catalog.git" HEAD 2>&1 | head -5
          echo "exit=$?"
          set -e
          git config --global \
            url."https://x-access-token:${SOYUZ_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
