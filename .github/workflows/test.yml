name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Do not persist the auth header into local git config.
          # Otherwise later git operations inside this cloned repo
          # (uv's soyuz-catalog fetch, any `git ls-remote`, ...)
          # collide with our own env-provided extraheader →
          # GitHub returns `400 Duplicate header: "Authorization"`.
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        # File-based global git config instead of GIT_CONFIG_*
        # env vars. Attempt-8 debug revealed that only
        # GIT_CONFIG_VALUE_0 appeared in the step's env at all —
        # the COUNT and KEY_0 vars somehow didn't propagate
        # (YAML parser quirk, masking side-effect — unknown).
        # Writing directly to ~/.gitconfig sidesteps the env
        # propagation mystery. Combined with
        # `persist-credentials: false` on the checkout above,
        # this is the only Authorization header git sees.
        run: |
          git config --global \
            http.https://github.com/.extraheader \
            "Authorization: Bearer ${{ secrets.SOYUZ_READ_TOKEN }}"
          uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
