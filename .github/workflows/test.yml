name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Do not persist the auth header into local git config.
          # Otherwise later git operations inside this cloned repo
          # (uv's soyuz-catalog fetch, any `git ls-remote`, ...)
          # collide with our own env-provided extraheader →
          # GitHub returns `400 Duplicate header: "Authorization"`.
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        # Inject a Bearer extraheader for uv's git subprocess via
        # the GIT_CONFIG_COUNT/KEY/VALUE env trio. Step-local so
        # it is only active while uv is fetching the private
        # soyuz-catalog dep. Combined with persist-credentials:
        # false on the checkout above, this is the only
        # Authorization header git sees.
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: "http.https://github.com/.extraheader"
          GIT_CONFIG_VALUE_0: "Authorization: Bearer ${{ secrets.SOYUZ_READ_TOKEN }}"
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
