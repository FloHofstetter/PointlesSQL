name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Rewrite HTTPS clones of github.com to tunnel through the
      # SOYUZ_READ_TOKEN (classic PAT, Contents: Read on the private
      # soyuz-catalog repo). `uv sync` resolves the pinned
      # `[tool.uv.sources]` git-tag source directly — no sibling
      # checkout, no uv.toml override.
      - name: Configure git for private soyuz-catalog pull
        env:
          SOYUZ_READ_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
        run: |
          # Preflight: catch an empty / truncated / typo'd secret
          # before we get the inscrutable
          # `remote: Invalid username or token` from git. Classic PATs
          # are 40 chars (ghp_ + 36); fine-grained PATs are ~93 chars.
          LEN=$(printf '%s' "$SOYUZ_READ_TOKEN" | wc -c)
          if [ "$LEN" -lt 30 ]; then
            echo "::error::SOYUZ_READ_TOKEN is missing or truncated (${LEN} bytes). Re-paste it in Settings → Secrets → Actions." >&2
            exit 1
          fi
          # Validate that GitHub actually accepts the PAT. An expired
          # or revoked PAT returns 401 from /user — which is the
          # cheapest way to surface the right error before uv spends
          # a minute resolving dependencies.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${SOYUZ_READ_TOKEN}" \
            https://api.github.com/user)
          if [ "$STATUS" != "200" ]; then
            echo "::error::SOYUZ_READ_TOKEN is not accepted by GitHub (GET /user → HTTP ${STATUS}). The PAT may be revoked, expired, or corrupted during paste." >&2
            exit 1
          fi
          git config --global \
            url."https://x-access-token:${SOYUZ_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        # Fresh runner has no pointlessql.db — `alembic check`
        # needs a migrated target to compare against, not an empty
        # file. Upgrade to head first (creates the sqlite file at
        # the latest revision), then check compares ORM models.
        run: |
          uv run alembic upgrade head
          uv run alembic check
      - name: Frontend — BUG-64-02 reactivity-boundary gate
        # Sprint-65 grep gate.  Fails on `this._(editor|model|...)`
        # assignments inside frontend/js/notebook/ — those refs MUST
        # live in closure scope (see closure_state.js + commit
        # 0af7984).  Pure shell, no Python venv needed.
        run: bash scripts/check-frontend-no-reactive-monaco.sh
      - name: Frontend — bootstrap.js precedes Alpine CDN
        # Sprint-75 ESM-bridge ordering gate.  Asserts base.html keeps
        # ``<script type="module" src=".../bootstrap.js">`` before the
        # Alpine CDN script, so any factory migrated out of a legacy
        # IIFE file lands on ``window`` before Alpine's x-data walk.
        run: bash scripts/check-frontend-bootstrap-order.sh
