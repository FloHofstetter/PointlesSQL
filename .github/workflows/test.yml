name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + type + docstring + alembic
    runs-on: ubuntu-latest
    # soyuz-catalog-client is pinned to a private-repo git tag
    # under [tool.uv.sources]. `uv sync` needs a credential with
    # read access. The `SOYUZ_READ_TOKEN` repo secret is a fine-
    # grained PAT scoped read-only to the soyuz-catalog repo.
    # GH_TOKEN lives at job-level so *every* step (gh auth
    # setup-git below, but also `uv sync` which calls git via a
    # subprocess that inherits env) sees it.
    env:
      GH_TOKEN: ${{ secrets.SOYUZ_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for private soyuz-catalog pull
        run: |
          # Use `http.extraheader` with a Bearer token — the same
          # shape `actions/checkout` uses internally. Previous
          # attempts failed:
          #   1. `x-access-token:<token>@` URL → GitHub rejects PATs
          #      through that form ("Password authentication is
          #      not supported")
          #   2. `<token>@` URL (bare) → empty password, rejected
          #   3. `gh auth setup-git` credential helper → the
          #      username gh picks is not accepted by GitHub's
          #      basic-auth gate for fine-grained PATs
          # The extraheader form bypasses basic auth entirely and
          # uses Bearer-token auth, which GitHub accepts for any
          # valid PAT with Contents:Read on the target repo.
          git config --global \
            http.https://github.com/FloHofstetter/.extraheader \
            "Authorization: Bearer ${GH_TOKEN}"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pydoclint (Google style)
        run: uv run pydoclint --style=google pointlessql/
      - name: Alembic — no autogen drift
        run: uv run alembic check
