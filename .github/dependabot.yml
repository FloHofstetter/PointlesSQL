# Dependabot configuration — keeps Python dependencies, GitHub Actions, and
# container base images current. Version-update PRs run weekly; security
# updates are opened as soon as an advisory is published, regardless of the
# schedule below. Minor/patch bumps are grouped to keep the PR queue quiet.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
