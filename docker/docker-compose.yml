# PointlesSQL — pull-and-run stack.
#
# Zero-credential quickstart on any machine with Docker:
#
#   curl -fsSL https://raw.githubusercontent.com/FloHofstetter/PointlesSQL/main/docker/docker-compose.yml -o docker-compose.yml
#   docker compose up -d
#
# Pulls published images from GHCR — no source checkout, no login.
# Pin a specific release with PQL_VERSION / SOYUZ_VERSION.
#
# Contributors who build from a local checkout layer the dev override:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  soyuz-catalog:
    image: ghcr.io/flohofstetter/soyuz-catalog:${SOYUZ_VERSION:-v0.3.0rc3}
    ports:
      - "${SOYUZ_HOST_PORT:-8080}:8080"
    environment:
      SOYUZ_DATABASE_URL: "sqlite:////app/data/soyuz.db"
    volumes:
      - warehouse_data:/app/warehouse
      - soyuz_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8080/healthz').raise_for_status()",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  pointlessql:
    image: ghcr.io/flohofstetter/pointlessql:${PQL_VERSION:-v0.1.0rc3}
    ports:
      - "${PQL_HOST_PORT:-8000}:8000"
      - "${JUPYTER_HOST_PORT:-8888}:8888"
    environment:
      POINTLESSQL_SOYUZ_CATALOG_URL: "http://soyuz-catalog:8080"
      POINTLESSQL_DELTA_ENGINE: "${POINTLESSQL_DELTA_ENGINE:-pandas}"
      POINTLESSQL_SERVER_HOST: "0.0.0.0"
      POINTLESSQL_DB_URL: "sqlite:////app/data/pointlessql.db"
      POINTLESSQL_AUTH_SECRET_KEY: "docker-dev-secret-change-in-prod"
    volumes:
      - warehouse_data:/app/warehouse
      - pointlessql_data:/app/data
      - notebooks_data:/app/notebooks
    depends_on:
      soyuz-catalog:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/healthz').raise_for_status()",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  soyuz_data:
  pointlessql_data:
  warehouse_data:
  notebooks_data:
