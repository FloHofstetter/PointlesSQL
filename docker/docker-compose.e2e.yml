# Compose override — Playwright MCP walkthrough harness.
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.e2e.yml up -d
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.e2e.yml \
#       exec pointlessql python /app/scripts/seed-e2e.py
#
# Sprint 22 delivered the base overlay (``postgres-e2e`` sidecar as
# the foreign-catalog target + the seed script mount). Sprint 23 adds
# a mock OAuth2 server (``mock-oidc``) for the ``oidc.md`` playbook
# and a cluster of environment-variable passthroughs so individual
# playbooks can flip one knob (engine, log format, scheduler tick,
# Jupyter on/off, OIDC on/off) without editing this file.
#
# All OIDC / tick / format passthroughs use ``${…:-default}`` so the
# overlay is a no-op unless the host exports the override. That way
# the data-surface playbooks (Sprint 22) keep working unchanged.

services:
  pointlessql:
    # Expose the seed script inside the container so we can run it
    # server-side with ``docker compose exec pointlessql python
    # /app/scripts/seed-e2e.py``.  Server-side execution keeps all the
    # file:// URIs under ``/app/warehouse`` — consistent with how the
    # in-process scheduler and any subsequent notebook usage will see
    # the seeded Delta tables.
    volumes:
      - ../scripts:/app/scripts:ro
    environment:
      # Local e2e default so walkthrough replays stay zero-config;
      # override by exporting POINTLESSQL_AUTH_SECRET_KEY. Public value —
      # never use for a reachable deployment.
      POINTLESSQL_AUTH_SECRET_KEY: "${POINTLESSQL_AUTH_SECRET_KEY:-pql-local-dev-secret-not-for-production}"
      # Short scheduler tick for the ``jobs-dag.md`` playbook —
      # ``pointlessql/settings.py`` defaults to 30 s which is too slow
      # to exercise state transitions in a live walk.
      POINTLESSQL_SCHEDULER_TICK_SECONDS: "${POINTLESSQL_SCHEDULER_TICK_SECONDS:-2}"
      # Jupyter on/off toggle for ``notebook.md`` passes. Default is
      # ``true`` to preserve existing behaviour; ``notebook.md`` Pass 2
      # sets ``POINTLESSQL_JUPYTER_ENABLED=false`` on the host env.
      POINTLESSQL_JUPYTER_ENABLED: "${POINTLESSQL_JUPYTER_ENABLED:-true}"
      # Log format passthrough for ``config-matrix.md``. Default
      # ``text`` preserves existing behaviour; override via host env
      # when exercising the JSON delta walk.
      POINTLESSQL_LOG_FORMAT: "${POINTLESSQL_LOG_FORMAT:-text}"
      # OIDC bindings for ``oidc.md`` Pass 2. Empty by default so the
      # ``oidc_enabled`` computed property stays false — the
      # ``Sign in with SSO`` button only renders when both
      # discovery_url and client_id are non-empty.
      POINTLESSQL_OIDC_DISCOVERY_URL: "${POINTLESSQL_OIDC_DISCOVERY_URL:-}"
      POINTLESSQL_OIDC_CLIENT_ID: "${POINTLESSQL_OIDC_CLIENT_ID:-}"
      POINTLESSQL_OIDC_CLIENT_SECRET: "${POINTLESSQL_OIDC_CLIENT_SECRET:-}"
      # Sprint 45: ``POINTLESSQL_BASE_URL`` → ``POINTLESSQL_SERVER_BASE_URL``.
      POINTLESSQL_SERVER_BASE_URL: "${POINTLESSQL_SERVER_BASE_URL:-${POINTLESSQL_BASE_URL:-}}"

  postgres-e2e:
    image: postgres:17-alpine
    container_name: pql_postgres_e2e
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e  # pragma: allowlist secret
      POSTGRES_DB: ecommerce
    ports:
      - "${E2E_POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
      - ../scripts/pg-seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mock-oidc:
    # OAuth2 authorization-code + PKCE mock. Accepts any client_id,
    # issues signed tokens, provides a built-in login form at
    # /default/authorize — see https://github.com/navikt/mock-oauth2-server
    # for the on-the-fly issuer creation and login-form behaviour.
    #
    # The service is part of this overlay but the OIDC playbook only
    # flips it on by setting ``POINTLESSQL_OIDC_*`` on the host env;
    # keeping the container running regardless is fine (< 80 MB image,
    # idle memory footprint negligible) and avoids a second overlay.
    image: ghcr.io/navikt/mock-oauth2-server:latest
    container_name: pql_mock_oidc
    ports:
      - "${MOCK_OIDC_HOST_PORT:-9090}:8080"

volumes:
  postgres_e2e_data:
