# Files shipped on disk but deliberately absent from the gh-pages
# nav.  Used for static assets referenced by markdown pages
# (excalidraw source, hermes-jobs JSON samples).
not_in_nav: |
  /architecture.excalidraw
  /integrations/hermes-jobs/*.json

# Files shipped on disk but NOT rendered to HTML on gh-pages.
# Stronger contract than `not_in_nav`: the file ships for repo-
# viewing on GitHub but produces no HTML output, so strict-mode
# cross-link warnings into the source tree never fire.
#
# Use for maintainer-only artifacts under `docs/internal/` — IA
# contracts, audit reports, archive material — that legitimately
# reference source files outside `docs/` and would otherwise drown
# the strict-build with cross-link warnings.  See
# `docs/internal/doc-site-ia.md` for the contract.
exclude_docs: |
  internal/*

strict: true  # every cross-link in the walkthroughs resolves
              # either to a docs page or to the canonical GitHub
              # URL — broken links fail the build.
