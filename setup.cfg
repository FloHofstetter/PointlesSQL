# Mutation-testing configuration (mutmut 3.x).
#
# mutmut reads this ``[mutmut]`` section because pyproject.toml carries
# no ``[tool.mutmut]`` table — we keep pyproject free of mutation config
# on purpose so the tool stays opt-in and ad-hoc.  Everything else the
# project configures (ruff / pytest / pyright) lives in pyproject.toml;
# this file exists solely for mutmut.
#
# Run via the wrapper, which patches the trampoline KeyError before the
# mutant CST is built:
#
#     uv run --with mutmut==3.5.0 python scripts/mutation/run_mutmut.py run
#
# See scripts/mutation/README.md for the full workflow.
[mutmut]
# Only the two business-logic packages are worth mutating; the rest of
# pointlessql/ (routes, models, config) is integration-shell code that
# is covered end-to-end, not unit-tested at the seam mutmut probes.
paths_to_mutate =
    pointlessql/pql/
    pointlessql/services/

# mutmut copies the repo to ``mutants/`` and runs pytest with
# cwd=mutants/.  It auto-copies tests/, setup.cfg, pyproject.toml and
# .gitignore; we add the rest the suite needs at run time:
#   - pointlessql/  : the non-mutated remainder of the package (imports)
#   - frontend/     : templates resolved by relative path
#                     (Path(__file__).parents[2] / "frontend/templates")
#   - alembic.ini   : alembic config some service paths load
also_copy =
    pointlessql/
    frontend/
    alembic.ini

# Applied to every pytest invocation mutmut makes (stats collection,
# per-mutant runs, forced-fail, collect-only):
#   - the two AST-scanning meta-tests read pointlessql/ source and would
#     see the *mutated* tree, failing spuriously
#   - the two introspection tests assert on docstrings / signatures that
#     the trampoline wrappers strip / rewrite
#   - the operator-ledger meta-test enumerates the live PQL mixin methods
#     and would count mutmut's ``__mutmut_*`` trampoline variants as new,
#     unclassified operators — its failure silently aborts the whole stats
#     pass, so the gate must skip it for any mutant to ever be evaluated
pytest_add_cli_args =
    --ignore=tests/test_no_bare_http_exception.py
    --ignore=tests/test_no_lossy_broad_except.py
    --deselect=tests/test_pql_introspect_routes.py::test_primitives_returns_five_entries_with_signature_and_doc
    --deselect=tests/test_pql_introspect_routes.py::test_autoload_signature_carries_source_path_kwarg
    --deselect=tests/lineage_verify/test_coverage_ledger.py::test_every_operator_is_classified
